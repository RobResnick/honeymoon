<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="bevel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow layer -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40"
    fill="white" filter="url(#shadow)"/>

  <!-- White card background -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40" fill="white"/>

  <!-- Bevel overlay -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40"
    fill="url(#bevel)" opacity="1"/>

  <!-- Inner fine shadow on bottom-right edge -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40"
    fill="none" stroke="#000000" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- Icon content -->
  <g transform="translate(0, 22)">
    <!-- Red U body -->
    <path d="M 52 51 L 52 92 Q 52 146 100 146 Q 148 146 148 92 L 148 51"
      fill="none" stroke="#EA4335" stroke-width="17"
      stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Blue: left half of top arc -->
    <path d="M 25 31 C 60 62 75 56 100 56"
      fill="none" stroke="#4285F4" stroke-width="17" stroke-linecap="round"/>
    <!-- Green: right half of top arc -->
    <path d="M 100 56 C 125 56 140 62 175 31"
      fill="none" stroke="#34A853" stroke-width="17" stroke-linecap="round"/>
    <!-- Yellow uvula -->
    <rect x="91.5" y="64" width="17" height="42" rx="7" fill="#FBBC05"/>
  </g>
</svg>
