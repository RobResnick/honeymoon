<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Honeymoon</title>
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-title" content="Honeymoon">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" id="ati" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='white'/%3E%3Cdefs%3E%3CclipPath id='icf'%3E%3Cpath d='M50 34 C50 21 37 9 24 9 C9 9 7 24 7 30 C7 50 29 62 50 80 C71 62 93 50 93 30 C93 24 91 9 76 9 C63 9 50 21 50 34Z'/%3E%3C/clipPath%3E%3C/defs%3E%3Cg clip-path='url(%23icf)'%3E%3Crect x='0' y='0' width='50' height='46' fill='%23EA4335'/%3E%3Crect x='50' y='0' width='50' height='46' fill='%234285F4'/%3E%3Crect x='0' y='46' width='50' height='54' fill='%2334A853'/%3E%3Crect x='50' y='46' width='50' height='54' fill='%23FBBC04'/%3E%3C/g%3E%3Cpath d='M50 43 C50 33 43 25 36 25 C27 25 25 35 25 39 C25 53 38 62 50 73 C62 62 75 53 75 39 C75 35 73 25 64 25 C57 25 50 33 50 43Z' fill='white'/%3E%3Ccircle cx='34' cy='80' r='8.5' fill='%234285F4'/%3E%3Cpath d='M21 100 C21 89 27 86 34 86 C41 86 47 89 47 100Z' fill='%234285F4'/%3E%3Ccircle cx='67' cy='83' r='6.5' fill='%23FBBC04'/%3E%3Cpath d='M56 100 C56 91 61 88 67 88 C73 88 78 91 78 100Z' fill='%23FBBC04'/%3E%3C/svg%3E">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1A73E8;
      --blue-light: #e8f0fe;
      --blue-dark: #1557b0;
      --red: #EA4335;
      --red-light: #fce8e6;
      --green: #34A853;
      --purple: #9334E6;
      --purple-light: #f3e8fd;
      --text: #202124;
      --text2: #5f6368;
      --text3: #9aa0a6;
      --border: #dadce0;
      --bg: #f8f9fa;
      --card: #ffffff;
      --shadow: 0 1px 3px rgba(60,64,67,.15), 0 1px 2px rgba(60,64,67,.1);
      --shadow-md: 0 2px 6px rgba(60,64,67,.2), 0 1px 2px rgba(60,64,67,.12);
    }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── AUTH ── */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
    }
    .auth-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px 48px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
    }
    .auth-logo { display: flex; justify-content: center; margin-bottom: 12px; }
    .auth-logo img { width: 56px; height: 56px; }
    .auth-box h1 {
      font-family: 'Google Sans', sans-serif;
      font-size: 24px; font-weight: 400;
      text-align: center; color: var(--text); margin-bottom: 6px;
    }
    .auth-box p.subtitle { color: var(--text2); font-size: 14px; margin-bottom: 28px; text-align: center; }
    .auth-toggle { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text2); }
    .auth-toggle a { color: var(--blue); cursor: pointer; text-decoration: none; }

    /* ── FORMS ── */
    label {
      display: block; font-size: 11px; font-weight: 500;
      color: var(--text2); margin-bottom: 4px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    input[type=text], input[type=email], input[type=password], select, textarea {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 4px;
      font-size: 14px; background: var(--card); color: var(--text);
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
      font-family: 'Roboto', Arial, sans-serif;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(26,115,232,0.15);
    }
    .field { margin-bottom: 16px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 20px; border-radius: 4px; font-size: 14px; font-weight: 500;
      cursor: pointer; border: none;
      transition: box-shadow 0.15s, background 0.15s, opacity 0.15s;
      font-family: 'Google Sans', sans-serif; letter-spacing: 0.01em;
    }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { opacity: 0.92; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-danger { background: #fce8e6; color: var(--red); border: 1px solid #f5c6c2; }
    .btn-full { width: 100%; }
    .btn-sm { padding: 6px 14px; font-size: 12px; }

    /* ── APP SHELL ── */
    #app { display: none; flex-direction: column; height: 100vh; }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      display: flex; align-items: center; gap: 10px;
      height: 52px; flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(60,64,67,.1);
    }
    .header-logo { width: 28px; height: 28px; flex-shrink: 0; }
    header h1 {
      font-family: 'Google Sans', sans-serif;
      font-size: 18px; font-weight: 400; color: var(--text); flex: 1;
    }
    .header-count {
      font-size: 12px; color: var(--text3);
      background: var(--bg); padding: 3px 10px;
      border-radius: 20px; border: 1px solid var(--border); display: none;
    }

    .main-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* ── FILTER BAR ── */
    .filter-bar {
      padding: 8px 12px 6px; background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 6px;
      position: relative; z-index: 100;
    }
    .filter-bar input[type=text] {
      padding: 9px 16px; font-size: 16px;
      border-radius: 24px; background: var(--bg); border: 1px solid var(--border);
    }
    .filter-row {
      display: flex; gap: 5px; overflow: hidden;
      max-height: 0; opacity: 0;
      transition: max-height 0.2s ease, opacity 0.15s ease, margin 0.2s ease;
    }
    .filter-bar.filters-open .filter-row,
    .mobile-filter-bar.filters-open .filter-row { max-height: 40px; opacity: 1; margin-top: 2px; }
    .filter-row select {
      flex: 1; padding: 5px 4px; font-size: 11px;
      border-radius: 20px; background: var(--bg); min-width: 0;
    }

    /* ── LIST ── */
    #list-view { flex: 1; overflow-y: auto; padding: 12px 16px; }

    /* ── CARDS ── */
    .rec-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; margin-bottom: 4px;
      cursor: pointer; transition: box-shadow 0.15s;
      box-shadow: var(--shadow); position: relative;
    }
    .rec-card:hover { box-shadow: var(--shadow-md); }
    .rec-card-top { display: flex; align-items: center; gap: 10px; }
    .rec-type-icon { font-size: 20px; flex-shrink: 0; line-height: 1; }
    .rec-card-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .rec-name-line { display: flex; align-items: baseline; gap: 6px; min-width: 0; }
    .rec-name {
      font-size: 13px; font-weight: 500;
      font-family: 'Google Sans', sans-serif;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text);
    }
    .rec-city-text { font-size: 12px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
    .rec-tags { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .tag {
      font-size: 11px; padding: 2px 8px; border-radius: 20px;
      font-weight: 500; border: 1px solid; white-space: nowrap;
    }
    .tag.person { background: var(--blue-light); color: var(--blue-dark); border-color: #b8cef8; }
    .tag.city   { background: var(--blue-light); color: var(--blue-dark); border-color: #b8cef8; }
    .tag.type   { background: var(--purple-light); color: var(--purple); border-color: #dbb8f8; }

    .rec-delete-btn {
      position: absolute; top: 8px; right: 10px;
      border: none; background: none; color: var(--text3);
      font-size: 18px; line-height: 1; cursor: pointer;
      opacity: 0; transition: opacity 0.15s, color 0.15s; z-index: 2; padding: 2px 4px;
    }
    .rec-card:hover .rec-delete-btn { opacity: 1; }
    .rec-delete-btn:hover { color: var(--red); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── MAP ── */
    #map-view { flex: 1; display: none; position: relative; }
    #map { height: 100%; width: 100%; }

    .leaflet-popup-content-wrapper {
      border-radius: 8px !important; box-shadow: var(--shadow-md) !important;
      border: 1px solid var(--border); font-family: 'Roboto', Arial, sans-serif;
    }
    .leaflet-popup-content { font-size: 13px; margin: 12px 16px !important; }
    .leaflet-popup-content strong {
      font-family: 'Google Sans', sans-serif; font-size: 14px;
      display: block; margin-bottom: 4px; color: var(--text);
    }
    .leaflet-popup-content em { color: var(--text2); font-style: normal; }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-control-attribution { font-size: 10px !important; }

    /* ── RECENTER BUTTON — bottom-left ── */
    .recenter-btn {
      position: absolute;
      bottom: 20px; left: 10px;
      z-index: 400; width: 40px; height: 40px;
      border-radius: 4px; background: white; border: none; cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center;
      color: var(--text2); transition: box-shadow 0.15s, color 0.15s;
    }
    .recenter-btn:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.3); color: var(--blue); }

    /* ── ADD BUTTON (desktop) ── */
    .add-btn {
      position: absolute; bottom: 20px; right: 16px;
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--blue); color: white;
      font-size: 26px; font-weight: 300; border: none; cursor: pointer;
      box-shadow: 0 2px 6px rgba(60,64,67,0.35), 0 4px 12px rgba(60,64,67,0.18);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; transition: box-shadow 0.15s, transform 0.15s; line-height: 1;
    }
    .add-btn:hover { box-shadow: 0 4px 12px rgba(60,64,67,0.45); transform: translateY(-1px); }

    /* Mobile-only elements hidden by default */
    .mobile-sheet { display: none; }
    .bottom-nav { display: none; }

    /* ── DRAWER ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(32,33,36,0.5);
      z-index: 2000; display: none; align-items: flex-end;
    }
    .overlay.open { display: flex; }
    .drawer {
      background: var(--card); border-radius: 12px 12px 0 0;
      width: 100%; max-height: 92vh; overflow-y: auto; padding: 8px 20px 32px;
    }
    .drawer-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 12px auto 20px;
    }
    .drawer h2 {
      font-family: 'Google Sans', sans-serif; font-size: 18px;
      font-weight: 400; margin-bottom: 20px; color: var(--text);
    }

    /* ── PARSE ── */
    .parse-area textarea { min-height: 100px; resize: vertical; font-size: 14px; line-height: 1.6; }
    .parse-results { margin-top: 16px; }
    .parse-result-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px; margin-bottom: 8px;
    }
    .parse-result-item .item-name {
      font-family: 'Google Sans', sans-serif; font-weight: 500;
      font-size: 15px; margin-bottom: 10px; color: var(--text);
    }

    /* ── MODALS ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(32,33,36,0.5);
      z-index: 3000; display: none;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border-radius: 8px;
      width: 100%; max-width: 480px; max-height: 90vh;
      overflow-y: auto; padding: 24px;
      box-shadow: 0 8px 24px rgba(60,64,67,.25);
    }
    .modal h2 {
      font-family: 'Google Sans', sans-serif;
      font-size: 18px; font-weight: 400; margin-bottom: 20px;
    }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* Detail modal specifics */
    .detail-header { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 20px; }
    .detail-icon { font-size: 36px; line-height: 1; flex-shrink: 0; padding-top: 2px; }
    .detail-name {
      font-family: 'Google Sans', sans-serif;
      font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 4px;
    }
    .detail-meta { font-size: 13px; color: var(--text2); }
    .detail-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 0; border-top: 1px solid var(--border); font-size: 14px;
    }
    .detail-row-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
    .detail-row a { color: var(--blue); text-decoration: none; }
    .detail-row a:hover { text-decoration: underline; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: white; padding: 10px 20px;
      border-radius: 4px; font-size: 13px; z-index: 5000;
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
      white-space: nowrap; box-shadow: var(--shadow-md);
    }
    .toast.show { opacity: 1; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════════════════════════════
       MOBILE LAYOUT
    ════════════════════════════════ */
    @media (hover: none) and (pointer: coarse) {
      body { background: #000; }

      #left-panel { display: none !important; }

      #app { position: fixed; inset: 0; overflow: hidden; background: #000; }

      /* Map fills full screen — nav floats on top */
      .main-content {
        position: fixed; top: 0; left: 0; right: 0;
        bottom: 0; z-index: 1;
      }
      #map-view { display: block !important; position: absolute; inset: 0; }

      /* ── FLOATING SEARCH BAR ── */
      .map-search-bar {
        position: fixed; top: 12px; left: 12px; right: 12px;
        display: flex; flex-direction: column; gap: 6px;
        background: white; border-radius: 16px;
        padding: 10px 14px 8px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.25);
        z-index: 600; /* above sheet (300) and nav (500) */
      }
      .map-search-top {
        display: flex; align-items: center; gap: 8px;
      }
      .map-search-top input {
        flex: 1; border: none; outline: none; box-shadow: none;
        font-size: 15px; background: transparent;
        color: var(--text); font-family: 'Roboto', Arial, sans-serif;
      }
      .map-search-top input::placeholder { color: var(--text3); }
      .map-search-top input:focus { border: none; box-shadow: none; }
      /* Filter row hidden until typing or list open */
      .map-filter-row {
        display: none; gap: 5px;
      }
      .map-search-bar.expanded .map-filter-row {
        display: flex;
      }
      .map-filter-row select {
        flex: 1; padding: 5px 4px; font-size: 11px;
        border-radius: 20px; background: var(--bg); border: 1px solid var(--border);
        min-width: 0;
      }

      /* Search suggestions dropdown */
      .search-suggestions {
        position: fixed; left: 12px; right: 12px; top: 70px; /* updated dynamically */
        background: white; border-radius: 12px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.18);
        z-index: 601; overflow: hidden; display: none;
      }
      .search-suggestions.visible { display: block; }

      /* Push Leaflet zoom controls above the nav bar */
      .leaflet-bottom.leaflet-right { bottom: 90px !important; }
      .suggestion-item {
        padding: 12px 16px; font-size: 14px; cursor: pointer;
        border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center;
      }
      .suggestion-item:last-child { border-bottom: none; }
      .suggestion-item:active { background: var(--bg); }

      /* Recenter: above nav */
      .recenter-btn { bottom: 94px; left: 10px; }
      .recenter-icon-fit { display: none; }    /* hide fit-all on mobile */
      .recenter-icon-locate { display: block; } /* show locate on mobile */

      /* ── BOTTOM SHEET ── */
      .mobile-sheet {
        display: flex; flex-direction: column;
        position: fixed; left: 0; right: 0; bottom: 82px;
        top: 130px;
        background: white; border-radius: 16px 16px 0 0;
        z-index: 300;
        transform: translateY(100%);
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
        overflow: hidden;
        will-change: transform;
      }
      .mobile-sheet.open { transform: translateY(0); }

      .mobile-sheet-handle {
        width: 36px; height: 4px; background: var(--border);
        border-radius: 2px; margin: 12px auto 6px; flex-shrink: 0; cursor: pointer;
      }

      .mobile-list-body {
        flex: 1; overflow-y: auto;
        padding: 0;
        -webkit-overflow-scrolling: touch;
      }

      /* Mobile list: full-width rows with dividers, no card styling */
      .mobile-list-body .rec-card {
        background: transparent; border: none; border-radius: 0;
        border-bottom: 1px solid var(--border); margin-bottom: 0;
        box-shadow: none; padding: 13px 16px;
      }
      .mobile-list-body .rec-card:last-child { border-bottom: none; }
      .mobile-list-body .rec-name { font-size: 14px; }

      /* Swipe-to-delete card styles */
      .mobile-list-body .rec-card { transition: transform 0.15s ease, opacity 0.15s ease; }

      /* ── BOTTOM NAV ── */
      .bottom-nav {
        display: flex; position: fixed;
        bottom: 0; left: 0; right: 0; height: 82px;
        background: white; border-top: 1px solid var(--border); z-index: 500;
      }
      .nav-btn {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 0;
        border: none; background: none; color: var(--text);
        font-family: 'Google Sans', sans-serif; cursor: pointer;
        padding: 8px 4px 10px; transition: color 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .nav-pill {
        padding: 4px 18px; border-radius: 16px; margin-bottom: 3px;
        transition: background 0.2s;
        display: flex; align-items: center; justify-content: center;
      }
      .nav-btn.active .nav-pill { background: var(--blue-light); }
      .nav-btn.active { color: var(--blue); }
      .nav-btn svg { display: block; }
      .nav-icon-img { width: 24px; height: 24px; display: block; }
      .nav-label { font-size: 11px; font-weight: 500; }

      /* Toast above bottom nav */
      .toast { bottom: 94px; }

      /* Modals on mobile: slide up from bottom */
      .modal-overlay { align-items: flex-end; padding: 0; }
      .modal { border-radius: 16px 16px 0 0; max-width: 100%; padding: 20px 20px 40px; }

      /* Drawer stays as-is */
      .drawer { border-radius: 12px 12px 0 0; }
    }

    /* ════════════════════════════════
       DESKTOP LAYOUT
    ════════════════════════════════ */
    @media (hover: hover) and (pointer: fine) {
      body { overflow: hidden; }
      #app { flex-direction: row; height: 100vh; }

      #left-panel {
        display: flex; flex-direction: column;
        width: 380px; min-width: 320px; flex-shrink: 0;
        height: 100vh; border-right: 1px solid var(--border);
        background: var(--card); position: relative; z-index: 10;
      }

      .filter-bar { flex-direction: column; gap: 6px; padding: 10px 12px; }
      .filter-bar input[type=text] { min-width: unset; border-radius: 20px; }
      .filter-row { display: flex; gap: 6px; }
      /* Apple-style filter selects on desktop */
      .filter-row select {
        flex: 1; font-size: 12px;
        border: 1px solid var(--border); border-radius: 20px;
        padding: 6px 10px; background: var(--bg);
        appearance: none; -webkit-appearance: none;
        cursor: pointer;
      }

      #list-view { display: block !important; flex: 1; overflow-y: auto; padding: 8px 12px 80px; }

      .main-content { flex: 1; position: relative; }
      #map-view { display: block !important; position: absolute; inset: 0; }

      .mobile-sheet { display: none !important; }
      .bottom-nav { display: none !important; }
      .map-search-bar { display: none !important; }
      .search-suggestions { display: none !important; }

      .overlay { align-items: center; justify-content: center; }
      .drawer { border-radius: 8px; max-width: 500px; }

      .rec-card { padding: 8px 12px; margin-bottom: 4px; }
      .tag { font-size: 11px; padding: 2px 8px; }
      /* Header count hidden until searching */
      .header-count { display: none; }

      /* Recenter on desktop: bottom-left, fit-all icon */

</head>
<body>

<div class="toast" id="toast"></div>

<script>
const TYPE_ICONS = {
  restaurant: '🍴', bar: '🍷', cafe: '☕', museum: '🏛️',
  attraction: '🎯', hotel: '🏨', shop: '🛍️', market: '🥬',
  beach: '🏖️', church: '⛪', neighborhood: '🗺️', other: '📍'
};
const TYPE_COLORS = {
  restaurant: '#EA4335', bar: '#9334E6', cafe: '#FBBC05', museum: '#1A73E8',
  attraction: '#34A853', hotel: '#1A73E8', shop: '#EA4335', market: '#34A853',
  beach: '#1A73E8', church: '#9334E6', neighborhood: '#34A853', other: '#5f6368'
};

let sessionToken = localStorage.getItem('hm_token') || null;
let allRecs = [], filtered = [];
let map = null, markers = [], locationDot = null;
let authMode = 'login';
let pendingParseCount = 0, pendingRawInput = '';

const isDesktop = () => window.matchMedia('(hover: hover) and (pointer: fine)').matches;

// ── AUTH ──
function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  document.getElementById('name-field').style.display = authMode === 'register' ? 'block' : 'none';
  document.querySelector('#auth-form button').textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-toggle-text').textContent = authMode === 'login' ? "Don't have an account?" : 'Already have an account?';
  document.getElementById('auth-toggle-link').textContent = authMode === 'login' ? 'Sign up' : 'Sign in';
}

async function submitAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const name = document.getElementById('auth-name').value.trim();
  if (!email || !password) return showToast('Email and password required');
  const endpoint = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
  const body = authMode === 'login' ? { email, password } : { email, password, name };
  const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) return showToast(data.error || 'Error');
  sessionToken = data.token;
  localStorage.setItem('hm_token', sessionToken);
  showApp();
}

async function logout() {
  await api('/api/auth/logout', 'POST');
  localStorage.removeItem('hm_token');
  sessionToken = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

async function api(url, method = 'GET', body = null) {
  const opts = { method, headers: { 'x-session-token': sessionToken } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(url, opts);
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

async function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  await loadRecs();
  await loadFilters();
  // Leaflet needs the container to be visible before it can measure dimensions
  setTimeout(() => {
    if (map) map.invalidateSize();
    else if (!isDesktop()) initMap();
  }, 200);
}

async function checkSession() {
  if (!sessionToken) return;
  showApp();
  const me = await api('/api/auth/me');
  if (!me) {
    localStorage.removeItem('hm_token');
    sessionToken = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
  }
}

// ── FILTERS ──
function getFilterValues() {
  if (isDesktop()) {
    return {
      search: document.getElementById('search-input').value.trim().toLowerCase(),
      city:   document.getElementById('filter-city').value.toLowerCase(),
      type:   document.getElementById('filter-type').value,
      person: document.getElementById('filter-person').value.toLowerCase(),
    };
  }
  return {
    search: document.getElementById('map-search-input').value.trim().toLowerCase(),
    city:   document.getElementById('mobile-city').value.toLowerCase(),
    type:   document.getElementById('mobile-type').value,
    person: document.getElementById('mobile-person').value.toLowerCase(),
  };
}

function recenterBtnClick() {
  if (isDesktop()) recenterMap();
  else goToCurrentLocation();
}

function expandSearchFilters() {
  document.getElementById('map-search-bar')?.classList.add('expanded');
  // Suggestions need repositioning
  const bar = document.getElementById('map-search-bar');
  const sugg = document.getElementById('search-suggestions');
  if (bar && sugg) sugg.style.top = (12 + bar.offsetHeight + 4) + 'px';
}

function collapseSearchFilters() {
  const sheet = document.getElementById('mobile-sheet');
  const hasSearch = document.getElementById('map-search-input')?.value.trim();
  if (!hasSearch && !sheet?.classList.contains('open')) {
    document.getElementById('map-search-bar')?.classList.remove('expanded');
  }
}

function clearMapSearch() {
  const inp = document.getElementById('map-search-input');
  inp.value = '';
  document.getElementById('map-search-clear').style.display = 'none';
  hideSuggestions();
  collapseSearchFilters();
  applyFilters();
  inp.focus();
}

let _sheetOpenedBySearch = false;

function handleSearchKey(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    hideSuggestions();
    applyFilters();
    const q = e.target.value.trim();
    if (q) jumpToSearch(q);
    e.target.blur();
    // If search auto-opened the sheet, close it on Enter
    if (_sheetOpenedBySearch) {
      _sheetOpenedBySearch = false;
      const sheet = document.getElementById('mobile-sheet');
      sheet.classList.remove('open');
      document.getElementById('nav-list').classList.remove('active');
      document.getElementById('nav-map').classList.add('active');
      document.getElementById('map-search-bar')?.classList.remove('expanded');
    }
  }
}

async function jumpToSearch(q) {
  if (!map) return;
  const lq = q.toLowerCase();
  // 1. Match a city in our data → filter + pan to it
  const cityMatch = allRecs.find(r => r.city && r.city.toLowerCase() === lq);
  if (cityMatch && cityMatch.latitude && cityMatch.longitude) {
    map.setView([cityMatch.latitude, cityMatch.longitude], 13); return;
  }
  // 2. Match a place name → pan to it
  const placeMatch = allRecs.find(r => r.name.toLowerCase().includes(lq) && r.latitude);
  if (placeMatch) {
    map.setView([placeMatch.latitude, placeMatch.longitude], 15); return;
  }
  // 3. Geocode via Nominatim
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`, {
      headers: { 'Accept-Language': 'en' }
    });
    const data = await res.json();
    if (data && data[0]) map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 13);
  } catch(e) {}
}

function onSearchFocus() {
  const val = document.getElementById('map-search-input')?.value || '';
  if (val.length > 1) showSuggestions(val);
  if (!isDesktop()) {
    expandSearchFilters();
    const sheet = document.getElementById('mobile-sheet');
    if (!sheet.classList.contains('open')) {
      _sheetOpenedBySearch = true;
      sheet.classList.add('open');
      document.getElementById('nav-list').classList.add('active');
      document.getElementById('nav-map').classList.remove('active');
      renderMobileList();
    }
  }
}

function onSearchInput(val) {
  document.getElementById('map-search-clear').style.display = val ? 'block' : 'none';
  applyFilters();
  if (val.length > 0) {
    expandSearchFilters();
    // Auto-open list sheet while typing (on mobile, map view only)
    if (!isDesktop()) {
      const sheet = document.getElementById('mobile-sheet');
      if (!sheet.classList.contains('open')) {
        _sheetOpenedBySearch = true;
        sheet.classList.add('open');
        document.getElementById('nav-list').classList.add('active');
        document.getElementById('nav-map').classList.remove('active');
      }
    }
  } else {
    hideSuggestions();
    collapseSearchFilters();
    if (_sheetOpenedBySearch) {
      _sheetOpenedBySearch = false;
      const sheet = document.getElementById('mobile-sheet');
      sheet.classList.remove('open');
      document.getElementById('nav-list').classList.remove('active');
      document.getElementById('nav-map').classList.add('active');
    }
  }
  if (val.length > 1) showSuggestions(val);
  else hideSuggestions();
}

function showSuggestions(q) {
  if (!q) { hideSuggestions(); return; }
  const lq = q.toLowerCase();
  const box = document.getElementById('search-suggestions');
  if (!box) return;
  // Position just below the search bar
  const bar = document.getElementById('map-search-bar');
  if (bar) box.style.top = (12 + bar.offsetHeight + 4) + 'px';

  // Match place names and cities
  const placeMatches = allRecs
    .filter(r => r.name.toLowerCase().includes(lq) || (r.city||'').toLowerCase().includes(lq))
    .slice(0, 6);

  // Unique cities matching
  const citySet = new Set();
  allRecs.forEach(r => { if (r.city && r.city.toLowerCase().includes(lq)) citySet.add(r.city); });
  const cities = [...citySet].slice(0, 3);

  let html = '';
  cities.forEach(c => {
    html += `<div class="suggestion-item" onclick="selectCitySuggestion('${esc(c)}')">
      <span style="color:var(--text2);font-size:16px">📍</span>
      <span><strong>${esc(c)}</strong> <span style="color:var(--text2);font-size:12px">city</span></span>
    </div>`;
  });
  placeMatches.forEach(r => {
    const cleanName = r.name.replace(/^[\p{Emoji}\s]+/u, '').trim() || r.name;
    html += `<div class="suggestion-item" onclick="selectPlaceSuggestion(${r.id})">
      <span style="font-size:16px">${TYPE_ICONS[r.type]||'📍'}</span>
      <span>${esc(cleanName)} ${r.city ? `<span style="color:var(--text2);font-size:12px">· ${esc(r.city)}</span>` : ''}</span>
    </div>`;
  });

  if (!html) { hideSuggestions(); return; }
  box.innerHTML = html;
  box.classList.add('visible');
}

function hideSuggestions() {
  const box = document.getElementById('search-suggestions');
  if (box) box.classList.remove('visible');
}

function selectCitySuggestion(city) {
  const inp = document.getElementById('map-search-input');
  if (inp) inp.value = city;
  document.getElementById('map-search-clear').style.display = 'block';
  hideSuggestions();
  applyFilters();
  jumpToSearch(city);
}

function selectPlaceSuggestion(id) {
  hideSuggestions();
  const r = allRecs.find(x => x.id === id);
  if (!r) return;
  const inp = document.getElementById('map-search-input');
  if (inp) { inp.value = r.name.replace(/^[\p{Emoji}\s]+/u,'').trim()||r.name; }
  document.getElementById('map-search-clear').style.display = 'block';
  applyFilters();
  panToRec(id);
}

async function loadRecs(fromServer = true) {
  if (fromServer) allRecs = await api('/api/recommendations') || [];
  const { search, city, type, person } = getFilterValues();
  filtered = allRecs.filter(r => {
    if (city   && (r.city||'').toLowerCase() !== city) return false;
    if (type   && r.type !== type) return false;
    if (person && !(r.recommended_by||'').toLowerCase().split(',').map(p=>p.trim()).includes(person)) return false;
    if (search) {
      const hay = [r.name, r.city, r.notes, r.recommended_by].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  renderList();
  if (map) renderMapMarkers();
  renderMobileList();
  document.getElementById('rec-count').textContent = filtered.length + (filtered.length === 1 ? ' place' : ' places');
}

async function loadFilters() {
  const data = await api('/api/filters');
  if (!data) return;
  ['filter-city','mobile-city'].forEach(id => fillSelect(id, data.cities));
  ['filter-type','mobile-type'].forEach(id => fillSelect(id, data.types));
  ['filter-person','mobile-person'].forEach(id => fillSelect(id, data.people));
  fillDatalist('city-suggestions', data.cities);
  fillDatalist('person-suggestions', data.people);
}

function fillDatalist(id, items) {
  const dl = document.getElementById(id);
  if (!dl) return;
  dl.innerHTML = items.map(v => `<option value="${esc(v)}">`).join('');
}

function fillSelect(id, items) {
  const sel = document.getElementById(id);
  if (!sel) return;
  const current = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  items.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v.charAt(0).toUpperCase() + v.slice(1);
    sel.appendChild(o);
  });
  if (current) sel.value = current;
}

let filterDebounce = null;
function applyFilters() {
  clearTimeout(filterDebounce);
  filterDebounce = setTimeout(() => loadRecs(false), 150);
}

// ── RENDER ──
function cardHtml(r) {
  const cleanName = r.name.replace(/^[\p{Emoji}\s]+/u, '').trim() || r.name;
  return `
    <div class="rec-card" id="card-${r.id}" data-id="${r.id}" onclick="handleCardTap(${r.id})">
      <div class="rec-card-top">
        <div class="rec-type-icon">${TYPE_ICONS[r.type] || '📍'}</div>
        <div class="rec-card-info">
          <div class="rec-name-line">
            <div class="rec-name">${esc(cleanName)}</div>
            ${r.city ? `<div class="rec-city-text">${esc(r.city)}</div>` : ''}
          </div>
          ${r.recommended_by ? `<div class="rec-tags">${r.recommended_by.split(',').map(p=>`<span class="tag person">${esc(p.trim())}</span>`).join('')}</div>` : ''}
        </div>
      </div>
    </div>`;
}

function renderList() {
  // Simple, safe render — used by both desktop and mobile
  const noRecs = `<div class="empty-state"><div class="emoji">🗺️</div><p>No recommendations yet.<br>Tap <strong>+</strong> to get started.</p></div>`;
  const html = !allRecs.length ? noRecs
    : (filtered.length ? filtered.map(cardHtml).join('') : '<div class="empty-state"><p>No matches.</p></div>');
  ['list-view', 'mobile-list-view'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = html;
  });
  if (!isDesktop()) initSwipeDelete();
}

// Mobile-only: viewport-filtered list with "recently added" fallback
// Called AFTER renderMapMarkers so it never blocks marker rendering
function renderMobileList() {
  if (isDesktop()) return;
  try {
    const mlv = document.getElementById('mobile-list-view');
    if (!mlv) return;
    const noMatch = '<div class="empty-state"><p>No matches.</p></div>';
    let html;
    if (!allRecs.length) {
      html = `<div class="empty-state"><div class="emoji">🗺️</div><p>No recommendations yet.<br>Tap <strong>+</strong> to get started.</p></div>`;
    } else {
      // If search/filter is active → show ALL matches, no viewport clipping
      // (avoids city results flashing then disappearing after map pans)
      const hasFilter = (document.getElementById('map-search-input')?.value.trim() || '')
        || document.getElementById('mobile-city')?.value
        || document.getElementById('mobile-type')?.value
        || document.getElementById('mobile-person')?.value;
      if (hasFilter) {
        html = filtered.length ? filtered.map(cardHtml).join('') : noMatch;
      } else if (map) {
        // No filter → show only places in current map viewport
        const bounds = map.getBounds();
        const inBounds = filtered.filter(r => r.latitude && r.longitude
          && bounds.contains([parseFloat(r.latitude), parseFloat(r.longitude)]));
        if (inBounds.length) {
          html = inBounds.map(cardHtml).join('');
        } else {
          // Nothing in viewport → recently added fallback
          const recent = [...allRecs].sort((a, b) => b.id - a.id).slice(0, 12);
          html = recent.length
            ? `<div style="padding:10px 16px 4px;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Recently added</div>` + recent.map(cardHtml).join('')
            : noMatch;
        }
      } else {
        html = filtered.length ? filtered.map(cardHtml).join('') : noMatch;
      }
    }
    mlv.innerHTML = html;
    initSwipeDelete();
  } catch(e) {
    console.error('renderMobileList error:', e);
  }
}

// ── CARD INTERACTIONS ──
let _lastTapId = null, _lastTapTime = 0, _swipeBlocking = false;

function handleCardTap(id) {
  if (_swipeBlocking) return;
  const now = Date.now();
  if (_lastTapId === id && now - _lastTapTime < 350) {
    // Double tap → details
    _lastTapTime = 0; _lastTapId = null;
    openDetail(id);
  } else {
    _lastTapId = id; _lastTapTime = now;
    // Single tap → pan map to place (after slight delay to detect double)
    setTimeout(() => {
      if (_lastTapId === id && Date.now() - _lastTapTime >= 340) {
        panToRec(id);
      }
    }, 360);
  }
}

// Close sheet + update nav WITHOUT triggering geolocation
function closeSheetOnly() {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-map').classList.add('active');
  document.getElementById('mobile-sheet').classList.remove('open');
  collapseSearchFilters();
}

function panToRec(id) {
  const r = allRecs.find(x => x.id === id);
  if (!r) return;
  if (!isDesktop()) closeSheetOnly();
  if (map && r.latitude && r.longitude) {
    map.setView([r.latitude, r.longitude], 16);
  }
}

function initSwipeDelete() {
  ['mobile-list-view','list-view'].forEach(cid => {
    const container = document.getElementById(cid);
    if (!container) return;
    container.querySelectorAll('.rec-card').forEach(card => {
      let startX = 0, startY = 0, curX = 0, active = false, dirLocked = false, isHoriz = false;
      const id = parseInt(card.dataset.id);

      card.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        curX = 0; active = true; dirLocked = false; isHoriz = false;
        card.style.transition = 'none';
        _swipeBlocking = false;
      }, { passive: true });

      card.addEventListener('touchmove', e => {
        if (!active) return;
        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;
        if (!dirLocked && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
          dirLocked = true;
          isHoriz = Math.abs(dx) > Math.abs(dy) && dx < 0;
        }
        if (!isHoriz) return;
        curX = Math.min(0, dx);
        _swipeBlocking = true;
        card.style.transform = `translateX(${curX}px)`;
        const frac = Math.min(1, Math.abs(curX) / 120);
        card.style.background = `rgba(234,67,53,${frac * 0.12})`;
      }, { passive: true });

      card.addEventListener('touchend', () => {
        if (!active) return;
        active = false;
        if (isHoriz && Math.abs(curX) > 110) {
          card.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
          card.style.transform = 'translateX(-100%)';
          card.style.opacity = '0';
          setTimeout(() => { _swipeBlocking = false; deleteRec(id); }, 220);
        } else {
          card.style.transition = '';
          card.style.transform = '';
          card.style.background = '';
          setTimeout(() => { _swipeBlocking = false; }, 50);
        }
      }, { passive: true });
    });
  });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── DETAIL MODAL ──
function mapsUrl(r) {
  // Always use name+city search so it opens the actual business listing
  const q = [r.name, r.neighborhood, r.city, 'Italy'].filter(Boolean).join(', ');
  return `https://www.google.com/maps/search/${encodeURIComponent(q)}`;
}

function openDetail(id) {
  const r = allRecs.find(x => x.id === id);
  if (!r) return;
  document.getElementById('detail-icon').textContent = TYPE_ICONS[r.type] || '📍';
  document.getElementById('detail-name').textContent = r.name.replace(/^[\p{Emoji}\s]+/u, '').trim() || r.name;
  document.getElementById('detail-meta').textContent = [r.city, r.type ? r.type.charAt(0).toUpperCase()+r.type.slice(1) : ''].filter(Boolean).join(' · ');

  const phoneRow = document.getElementById('detail-phone-row');
  if (r.phone) {
    phoneRow.style.display = 'flex';
    const link = document.getElementById('detail-phone-link');
    link.textContent = r.phone;
    link.href = 'tel:' + r.phone.replace(/[^\d+]/g, '');
  } else {
    phoneRow.style.display = 'none';
  }

  document.getElementById('detail-maps-link').href = mapsUrl(r);

  const peopleRow = document.getElementById('detail-people-row');
  if (r.recommended_by) {
    peopleRow.style.display = 'flex';
    document.getElementById('detail-people').innerHTML =
      r.recommended_by.split(',').map(p => `<span class="tag person" style="margin-right:4px">${esc(p.trim())}</span>`).join('');
  } else {
    peopleRow.style.display = 'none';
  }

  const notesRow = document.getElementById('detail-notes-row');
  notesRow.style.display = 'flex'; // always visible
  let notesHtml = r.notes ? esc(r.notes) : '<span style="color:var(--text3);font-style:italic">No notes yet</span>';
  if (r.source_url) notesHtml += `<br><a href="${esc(r.source_url)}" target="_blank" style="color:var(--blue);font-size:12px;margin-top:4px;display:inline-block">View source ↗</a>`;
  document.getElementById('detail-notes-text').innerHTML = notesHtml;

  const editBtn = document.getElementById('detail-edit-btn');
  editBtn.onclick = () => { closeDetailModal(); openEdit(id); };
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetailModal(e) {
  if (!e || e.target === document.getElementById('detail-overlay')) {
    document.getElementById('detail-overlay').classList.remove('open');
  }
}

// ── MOBILE NAV + SWIPE ──
function setMode(mode) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const sheet = document.getElementById('mobile-sheet');

  if (mode === 'list') {
    document.getElementById('nav-list').classList.add('active');
    sheet.classList.add('open');
    expandSearchFilters();
    if (!map) initMap();
    renderMobileList(); // re-render with current map viewport bounds
  } else if (mode === 'map') {
    document.getElementById('nav-map').classList.add('active');
    sheet.classList.remove('open');
    collapseSearchFilters();
    if (!map) initMap();
    // Zoom to current location
    goToCurrentLocation();
  } else if (mode === 'add') {
    document.getElementById('nav-map').classList.add('active');
    sheet.classList.remove('open');
    openAddDrawer();
  }
}

function goToCurrentLocation() {
  if (!map) return;
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      map.setView([pos.coords.latitude, pos.coords.longitude], 14);
    }, () => {
      // No location — fit all markers instead
      if (markers.length) recenterMap();
    }, { enableHighAccuracy: true, timeout: 6000 });
  }
}

// Swipe-to-dismiss for mobile sheet
function initSheetSwipe() {
  const sheet = document.getElementById('mobile-sheet');
  const handle = document.getElementById('sheet-handle');
  const listBody = document.getElementById('mobile-list-view');
  let startX = 0, startY = 0, isDragging = false;

  function onTouchStart(e) {
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
    // Blur any focused input so cursor doesn't drift with the sheet
    if (document.activeElement && document.activeElement !== document.body) {
      document.activeElement.blur();
    }
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = true;
    sheet.style.transition = 'none';
  }
  function onTouchMove(e) {
    if (!isDragging) return;
    const dx = Math.abs(e.touches[0].clientX - startX);
    const dy = e.touches[0].clientY - startY;
    // Cancel if horizontal movement dominates (card swipe)
    if (dx > Math.abs(dy) && dx > 8) { isDragging = false; sheet.style.transform = ''; return; }
    if (dy > 0) sheet.style.transform = `translateY(${dy}px)`;
  }
  function onTouchEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    sheet.style.transition = '';
    const delta = e.changedTouches[0].clientY - startY;
    sheet.style.transform = '';
    if (delta > 80) setMode('map');
  }

  handle.addEventListener('touchstart', onTouchStart, { passive: true });
  handle.addEventListener('touchmove', onTouchMove, { passive: true });
  handle.addEventListener('touchend', onTouchEnd, { passive: true });

  listBody.addEventListener('touchstart', e => {
    if (listBody.scrollTop <= 0) onTouchStart(e);
  }, { passive: true });
  listBody.addEventListener('touchmove', e => {
    if (isDragging) onTouchMove(e);
  }, { passive: true });
  listBody.addEventListener('touchend', e => {
    if (isDragging) onTouchEnd(e);
  }, { passive: true });
}

// Swipe-to-dismiss for add drawer — full drawer, scroll-aware
function initDrawerSwipe() {
  const drawer = document.getElementById('add-drawer');
  let startY = 0, isDragging = false;

  function onTouchStart(e) {
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA' || tag === 'BUTTON') return;
    if (drawer.scrollTop > 0) return; // only allow swipe when at top
    startY = e.touches[0].clientY;
    isDragging = true;
    drawer.style.transition = 'none';
  }
  function onTouchMove(e) {
    if (!isDragging) return;
    const delta = e.touches[0].clientY - startY;
    if (delta > 0) drawer.style.transform = `translateY(${delta}px)`;
  }
  function onTouchEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    const delta = e.changedTouches[0].clientY - startY;
    if (delta > 80) {
      drawer.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
      drawer.style.transform = 'translateY(100%)';
      setTimeout(() => {
        drawer.style.transition = '';
        drawer.style.transform = '';
        document.getElementById('add-overlay').classList.remove('open');
      }, 300);
    } else {
      drawer.style.transition = '';
      drawer.style.transform = '';
    }
  }

  drawer.addEventListener('touchstart', onTouchStart, { passive: true });
  drawer.addEventListener('touchmove', onTouchMove, { passive: true });
  drawer.addEventListener('touchend', onTouchEnd, { passive: true });
}

// ── MAP ──
function initMap() {
  if (map) { renderMapMarkers(); return; }
  map = L.map('map', { zoomControl: false }).setView([42.5, 12.5], 7);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>',
    maxZoom: 19, subdomains: 'abcd'
  }).addTo(map);
  // Hide Leaflet attribution (covered by nav bar)
  const attr = document.querySelector('.leaflet-control-attribution');
  if (attr) attr.style.display = 'none';

  // Blue dot for current location
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      if (locationDot) map.removeLayer(locationDot);
      locationDot = L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
        radius: 9, fillColor: '#4285F4', color: 'white',
        weight: 3, fillOpacity: 1, zIndexOffset: 1000
      }).addTo(map).bindPopup('You are here');
      // On mobile: zoom to current location on first load
      if (!isDesktop()) {
        map.setView([pos.coords.latitude, pos.coords.longitude], 14);
      }
    }, () => {
      // No location — fit all markers
      if (markers.length) recenterMap();
    }, { enableHighAccuracy: true, timeout: 8000 });
  }

  renderMapMarkers();
  // If no geolocation and we have markers, fit them
  if (!navigator.geolocation && markers.length) recenterMap();
  // Re-render mobile list when map moves to reflect current viewport
  map.on('moveend', () => {
    if (!isDesktop()) {
      const sheet = document.getElementById('mobile-sheet');
      if (sheet && sheet.classList.contains('open')) renderMobileList();
    }
  });
}

function recenterMap() {
  if (!map) return;
  if (markers.length) {
    map.fitBounds(L.featureGroup(markers).getBounds().pad(0.3), { maxZoom: 14 });
  } else {
    map.setView([42.5, 12.5], 6);
  }
}

function renderMapMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  filtered.filter(r => r.latitude && r.longitude).forEach(r => {
    const color = TYPE_COLORS[r.type] || '#1A73E8';
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${color};display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.3);border:2px solid white"><span style="transform:rotate(45deg);font-size:16px;line-height:1">${TYPE_ICONS[r.type]||'📍'}</span></div>`,
      iconSize: [36,36], iconAnchor: [18,36], popupAnchor: [0,-36]
    });
    const m = L.marker([r.latitude, r.longitude], { icon }).addTo(map);
    m.on('click', () => openDetail(r.id));
    markers.push(m);
  });
}

// ── ADD DRAWER ──
function openAddDrawer() {
  document.getElementById('raw-input').value = '';
  document.getElementById('input-city').value = '';
  document.getElementById('input-person').value = '';
  document.getElementById('parse-results').innerHTML = '';
  document.getElementById('add-overlay').classList.add('open');
}

function closeAddDrawer(e) {
  if (!e || e.target === document.getElementById('add-overlay')) {
    document.getElementById('add-overlay').classList.remove('open');
  }
}

async function parseInput() {
  const input = document.getElementById('raw-input').value.trim();
  if (!input) return showToast('Paste something first');
  const city = document.getElementById('input-city').value.trim();
  const recommended_by = document.getElementById('input-person').value.trim();
  const btn = document.getElementById('parse-btn');
  btn.innerHTML = '<span class="spinner"></span> Parsing…';
  btn.disabled = true;
  const data = await api('/api/parse', 'POST', { input });
  btn.innerHTML = 'Add';
  btn.disabled = false;
  if (!data || !data.recommendations) return showToast('Could not parse — try again');

  // Auto-save if exactly 1 result (no confirmation step)
  if (data.recommendations.length === 1) {
    btn.innerHTML = '<span class="spinner"></span> Saving…';
    btn.disabled = true;
    const rec = { ...data.recommendations[0], city: city || data.recommendations[0].city, recommended_by, raw_input: input };
    const saved = await api('/api/recommendations', 'POST', [rec]);
    btn.innerHTML = 'Add'; btn.disabled = false;
    closeAddDrawer();
    showToast(`Added ${saved?.[0]?.name || 'place'}!`);
    await loadRecs(); await loadFilters();
    return;
  }
  renderParseResults(data.recommendations, input);
}

function renderParseResults(recs, rawInput) {
  const el = document.getElementById('parse-results');
  if (!recs.length) { el.innerHTML = '<p style="color:var(--text2);font-size:13px">No recommendations found.</p>'; return; }
  const types = ['restaurant','bar','cafe','museum','attraction','hotel','shop','market','beach','church','neighborhood','other'];
  const isSingle = recs.length === 1;
  pendingParseCount = recs.length;
  pendingRawInput = rawInput;
  el.innerHTML = recs.map((r, i) => `
    <div class="parse-result-item" id="result-${i}">
      <div class="item-name" data-name="${esc(r.name)}">${esc(r.name)}</div>
      <div class="field">
        <label>Type</label>
        <select id="r-type-${i}">${types.map(t=>`<option value="${t}"${r.type===t?' selected':''}>${t.charAt(0).toUpperCase()+t.slice(1)}</option>`).join('')}</select>
      </div>
      ${isSingle ? `<div class="field"><label>Notes</label><textarea id="r-notes-${i}" style="min-height:60px;resize:vertical">${esc(r.notes||'')}</textarea></div>` : ''}
    </div>
  `).join('') + `
    <div style="display:flex;gap:8px;margin-top:8px;padding-bottom:8px">
      <button class="btn btn-ghost" onclick="closeAddDrawer()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveParseResults()">Save ${recs.length} place${recs.length>1?'s':''}</button>
    </div>`;
}

async function saveParseResults() {
  const count = pendingParseCount, rawInput = pendingRawInput;
  const city = document.getElementById('input-city').value.trim();
  const recommended_by = document.getElementById('input-person').value.trim();
  const isSingle = count === 1;
  const recs = [];
  for (let i = 0; i < count; i++) {
    const nameDiv = document.querySelector(`#result-${i} .item-name`);
    recs.push({
      name: nameDiv ? nameDiv.dataset.name : '',
      type: document.getElementById(`r-type-${i}`)?.value,
      city, recommended_by,
      notes: isSingle ? (document.getElementById(`r-notes-${i}`)?.value || '') : '',
      raw_input: rawInput,
    });
  }
  const btn = document.querySelector('#parse-results .btn-primary');
  if (btn) { btn.innerHTML = '<span class="spinner"></span> Saving…'; btn.disabled = true; }
  const saved = await api('/api/recommendations', 'POST', recs);
  closeAddDrawer();
  showToast(`Saved ${saved?.length || count} place${count>1?'s':''}!`);
  await loadRecs(); await loadFilters();
}

// ── EDIT ──
function openEdit(id, e) {
  if (e) e.stopPropagation();
  const r = allRecs.find(x => x.id === id);
  if (!r) return;
  document.getElementById('edit-id').value = r.id;
  document.getElementById('edit-name').value = r.name || '';
  document.getElementById('edit-type').value = r.type || 'other';
  document.getElementById('edit-city').value = r.city || '';
  document.getElementById('edit-neighborhood').value = r.neighborhood || '';
  document.getElementById('edit-recommended-by').value = r.recommended_by || '';
  document.getElementById('edit-phone').value = r.phone || '';
  document.getElementById('edit-address').value = r.address || '';
  document.getElementById('edit-notes').value = r.notes || '';
  document.getElementById('edit-source-url').value = r.source_url || '';
  document.getElementById('edit-overlay').classList.add('open');
}

function closeEditModal(e) {
  if (!e || e.target === document.getElementById('edit-overlay')) {
    document.getElementById('edit-overlay').classList.remove('open');
  }
}

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const body = {
    name: document.getElementById('edit-name').value,
    type: document.getElementById('edit-type').value,
    city: document.getElementById('edit-city').value,
    neighborhood: document.getElementById('edit-neighborhood').value,
    recommended_by: document.getElementById('edit-recommended-by').value,
    phone: document.getElementById('edit-phone').value,
    address: document.getElementById('edit-address').value,
    notes: document.getElementById('edit-notes').value,
    source_url: document.getElementById('edit-source-url').value,
  };
  await api('/api/recommendations/' + id, 'PUT', body);
  closeEditModal();
  showToast('Saved!');
  await loadRecs(); await loadFilters();
}

async function deleteRec(id, e) {
  if (e) e.stopPropagation();
  if (!confirm('Delete this place?')) return;
  await api('/api/recommendations/' + id, 'DELETE'); // server logs before deleting
  showToast('Deleted');
  await loadRecs(); await loadFilters();
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ── PWA ICON: generate apple-touch-icon PNG from SVG via canvas ──
(function() {
  const svgSrc = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="white"/><defs><clipPath id="pwa_c"><path d="M50 34 C50 21 37 9 24 9 C9 9 7 24 7 30 C7 50 29 62 50 80 C71 62 93 50 93 30 C93 24 91 9 76 9 C63 9 50 21 50 34Z"/></clipPath></defs><g clip-path="url(#pwa_c)"><rect x="0" y="0" width="50" height="46" fill="#EA4335"/><rect x="50" y="0" width="50" height="46" fill="#4285F4"/><rect x="0" y="46" width="50" height="54" fill="#34A853"/><rect x="50" y="46" width="50" height="54" fill="#FBBC04"/></g><path d="M50 43 C50 33 43 25 36 25 C27 25 25 35 25 39 C25 53 38 62 50 73 C62 62 75 53 75 39 C75 35 73 25 64 25 C57 25 50 33 50 43Z" fill="white"/><circle cx="34" cy="80" r="8.5" fill="#4285F4"/><path d="M21 100 C21 89 27 86 34 86 C41 86 47 89 47 100Z" fill="#4285F4"/><circle cx="67" cy="83" r="6.5" fill="#FBBC04"/><path d="M56 100 C56 91 61 88 67 88 C73 88 78 91 78 100Z" fill="#FBBC04"/></svg>`;
  const blob = new Blob([svgSrc], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = 180;
    canvas.getContext('2d').drawImage(img, 0, 0, 180, 180);
    URL.revokeObjectURL(url);
    const link = document.getElementById('ati');
    if (link) link.href = canvas.toDataURL('image/png');
  };
  img.src = url;
})();

// ── DESKTOP: keep filters open when interacting with selects ──
function setupDesktopFilters() {
  const bar = document.getElementById('filter-bar');
  if (!bar) return;
  const inp = document.getElementById('search-input');
  const countEl = document.getElementById('rec-count');

  // Keep filters-open while anything in the bar is focused/changed
  bar.addEventListener('focusin', () => bar.classList.add('filters-open'));
  bar.addEventListener('change', () => bar.classList.add('filters-open'));
  bar.addEventListener('focusout', e => {
    if (!bar.contains(e.relatedTarget)) {
      setTimeout(() => { if (!bar.contains(document.activeElement)) bar.classList.remove('filters-open'); }, 200);
    }
  });

  // Show count + list only when search has content or a filter is active
  function updateDesktopList() {
    const hasSearch = inp && inp.value.trim();
    const hasFilter = ['filter-city','filter-type','filter-person'].some(id => {
      const el = document.getElementById(id); return el && el.value;
    });
    const active = hasSearch || hasFilter;
    if (countEl) countEl.style.display = active ? 'inline-block' : 'none';
    const lv = document.getElementById('list-view');
    if (lv) lv.style.visibility = active ? 'visible' : 'hidden';
  }

  if (inp) inp.addEventListener('input', updateDesktopList);
  ['filter-city','filter-type','filter-person'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('change', updateDesktopList);
  });
  updateDesktopList(); // initial state
}

// ── INIT ──
if (isDesktop()) {
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('map-view').style.display = 'block';
  setTimeout(() => { initMap(); setupDesktopFilters(); }, 100);
} else {
  setTimeout(() => { initMap(); initSheetSwipe(); initDrawerSwipe(); }, 100);
  document.getElementById('nav-map').classList.add('active');
  // Hide suggestions when tapping outside search bar
  document.addEventListener('touchstart', e => {
    const bar = document.getElementById('map-search-bar');
    const sugg = document.getElementById('search-suggestions');
    if (bar && !bar.contains(e.target) && sugg && !sugg.contains(e.target)) hideSuggestions();
  }, { passive: true });
}
checkSession();
</script>
