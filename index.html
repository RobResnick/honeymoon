<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Taste</title>
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Taste">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" id="ati" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='white'/%3E%3Cdefs%3E%3CclipPath id='icf'%3E%3Cpath d='M50 34 C50 21 37 9 24 9 C9 9 7 24 7 30 C7 50 29 62 50 80 C71 62 93 50 93 30 C93 24 91 9 76 9 C63 9 50 21 50 34Z'/%3E%3C/clipPath%3E%3C/defs%3E%3Cg clip-path='url(%23icf)'%3E%3Crect x='0' y='0' width='50' height='46' fill='%23EA4335'/%3E%3Crect x='50' y='0' width='50' height='46' fill='%234285F4'/%3E%3Crect x='0' y='46' width='50' height='54' fill='%2334A853'/%3E%3Crect x='50' y='46' width='50' height='54' fill='%23FBBC04'/%3E%3C/g%3E%3Cpath d='M50 43 C50 33 43 25 36 25 C27 25 25 35 25 39 C25 53 38 62 50 73 C62 62 75 53 75 39 C75 35 73 25 64 25 C57 25 50 33 50 43Z' fill='white'/%3E%3Ccircle cx='34' cy='80' r='8.5' fill='%234285F4'/%3E%3Cpath d='M21 100 C21 89 27 86 34 86 C41 86 47 89 47 100Z' fill='%234285F4'/%3E%3Ccircle cx='67' cy='83' r='6.5' fill='%23FBBC04'/%3E%3Cpath d='M56 100 C56 91 61 88 67 88 C73 88 78 91 78 100Z' fill='%23FBBC04'/%3E%3C/svg%3E">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1A73E8;
      --blue-light: #e8f0fe;
      --blue-dark: #1557b0;
      --red: #EA4335;
      --red-light: #fce8e6;
      --green: #34A853;
      --purple: #9334E6;
      --purple-light: #f3e8fd;
      --text: #202124;
      --text2: #5f6368;
      --text3: #9aa0a6;
      --border: #dadce0;
      --bg: #f8f9fa;
      --card: #ffffff;
      --shadow: 0 1px 3px rgba(60,64,67,.15), 0 1px 2px rgba(60,64,67,.1);
      --shadow-md: 0 2px 6px rgba(60,64,67,.2), 0 1px 2px rgba(60,64,67,.12);
    }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── AUTH ── */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      position: relative;
      z-index: 9999; /* sits above fixed buddy button */
    }
    .auth-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px 48px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
    }
    .auth-logo { display: flex; justify-content: center; margin-bottom: 12px; }
    .auth-logo img { width: 56px; height: 56px; }
    .auth-box h1 {
      font-family: 'Google Sans', sans-serif;
      font-size: 24px; font-weight: 400;
      text-align: center; color: var(--text); margin-bottom: 6px;
    }
    .auth-box p.subtitle { color: var(--text2); font-size: 14px; margin-bottom: 28px; text-align: center; }
    .auth-toggle { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text2); }
    .auth-toggle a { color: var(--blue); cursor: pointer; text-decoration: none; }

    /* ── FORMS ── */
    label {
      display: block; font-size: 11px; font-weight: 500;
      color: var(--text2); margin-bottom: 4px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    input[type=text], input[type=email], input[type=password], select, textarea {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 4px;
      font-size: 14px; background: var(--card); color: var(--text);
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
      font-family: 'Roboto', Arial, sans-serif;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(26,115,232,0.15);
    }
    .field { margin-bottom: 16px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 20px; border-radius: 4px; font-size: 14px; font-weight: 500;
      cursor: pointer; border: none;
      transition: box-shadow 0.15s, background 0.15s, opacity 0.15s;
      font-family: 'Google Sans', sans-serif; letter-spacing: 0.01em;
    }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { opacity: 0.92; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-danger { background: #fce8e6; color: var(--red); border: 1px solid #f5c6c2; }
    .btn-full { width: 100%; }
    .btn-sm { padding: 6px 14px; font-size: 12px; }

    /* ── APP SHELL ── */
    #app { display: none; flex-direction: column; height: 100vh; }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      display: flex; align-items: center; gap: 10px;
      height: 52px; flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(60,64,67,.1);
    }
    .header-logo { width: 28px; height: 28px; flex-shrink: 0; }
    header h1 {
      font-family: 'Google Sans', sans-serif;
      font-size: 18px; font-weight: 400; color: var(--text); flex: 1;
    }
    .header-count {
      font-size: 12px; color: var(--text3);
      background: var(--bg); padding: 3px 10px;
      border-radius: 20px; border: 1px solid var(--border); display: none;
    }

    .main-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* ── FILTER BAR ── */
    .filter-bar {
      padding: 8px 12px 6px; background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 6px;
      position: relative; z-index: 100;
    }
    .filter-bar input[type=text] {
      padding: 9px 16px; font-size: 16px;
      border-radius: 24px; background: var(--bg); border: 1px solid var(--border);
    }
    .filter-row {
      display: flex; gap: 5px; overflow: hidden;
      max-height: 0; opacity: 0;
      transition: max-height 0.2s ease, opacity 0.15s ease, margin 0.2s ease;
    }
    .filter-bar.filters-open .filter-row,
    .mobile-filter-bar.filters-open .filter-row { max-height: 40px; opacity: 1; margin-top: 2px; }
    .filter-row select {
      flex: 1; padding: 5px 4px; font-size: 11px;
      border-radius: 20px; background: var(--bg); min-width: 0;
    }

    /* ── LIST ── */
    #list-view { flex: 1; overflow-y: auto; padding: 12px 16px; }

    /* ── CARDS ── */
    .rec-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; margin-bottom: 4px;
      cursor: pointer; transition: box-shadow 0.15s;
      box-shadow: var(--shadow); position: relative;
    }
    .rec-card:hover { box-shadow: var(--shadow-md); }
    .rec-card-top { display: flex; align-items: center; gap: 10px; }
    .rec-type-icon { font-size: 20px; flex-shrink: 0; line-height: 1; }
    .rec-card-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .rec-name-line { display: flex; align-items: baseline; gap: 6px; min-width: 0; flex: 1; }
    .rec-person-tag { margin-left: auto; font-size: 11px; color: var(--blue-dark); background: var(--blue-light); border: 1px solid #b8cef8; border-radius: 20px; padding: 2px 8px; flex-shrink: 0; white-space: nowrap; }
    .rec-name {
      font-size: 13px; font-weight: 500;
      font-family: 'Google Sans', sans-serif;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text);
    }
    .rec-city-text { font-size: 12px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
    .rec-tags { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    /* People pill picker (add/edit forms) */
    .people-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; min-height: 28px; }
    .people-pill {
      padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--bg); font-size: 12px; cursor: pointer; color: var(--text2);
      font-family: inherit; transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .people-pill.selected { background: var(--blue); color: white; border-color: var(--blue); }
    .people-add-input {
      border: none; border-bottom: 1px solid var(--border); outline: none;
      font-size: 13px; padding: 2px 4px; background: transparent; color: var(--text);
      width: 100%; font-family: inherit;
    }
    .people-add-input::placeholder { color: var(--text3); }
    .tag {
      font-size: 11px; padding: 2px 8px; border-radius: 20px;
      font-weight: 500; border: 1px solid; white-space: nowrap;
    }
    .tag.person { background: var(--blue-light); color: var(--blue-dark); border-color: #b8cef8; }
    .tag.city   { background: var(--blue-light); color: var(--blue-dark); border-color: #b8cef8; }
    .tag.type   { background: var(--purple-light); color: var(--purple); border-color: #dbb8f8; }

    .rec-delete-btn {
      position: absolute; top: 8px; right: 10px;
      border: none; background: none; color: var(--text3);
      font-size: 18px; line-height: 1; cursor: pointer;
      opacity: 0; transition: opacity 0.15s, color 0.15s; z-index: 2; padding: 2px 4px;
    }
    .rec-card:hover .rec-delete-btn { opacity: 1; }
    .rec-delete-btn:hover { color: var(--red); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── MAP ── */
    #map-view { flex: 1; display: none; position: relative; }
    #map { height: 100%; width: 100%; }
    #map .leaflet-tile-pane { filter: grayscale(1) brightness(1.05); }

    .leaflet-popup-content-wrapper {
      border-radius: 8px !important; box-shadow: var(--shadow-md) !important;
      border: 1px solid var(--border); font-family: 'Roboto', Arial, sans-serif;
    }
    .leaflet-popup-content { font-size: 13px; margin: 12px 16px !important; }
    .leaflet-popup-content strong {
      font-family: 'Google Sans', sans-serif; font-size: 14px;
      display: block; margin-bottom: 4px; color: var(--text);
    }
    .leaflet-popup-content em { color: var(--text2); font-style: normal; }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-control-attribution { font-size: 10px !important; }

    /* ── RECENTER BUTTON — bottom-left ── */
    .recenter-btn {
      position: absolute;
      bottom: 20px; left: 10px;
      z-index: 400; width: 40px; height: 40px;
      border-radius: 4px; background: white; border: none; cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center;
      color: var(--text2); transition: box-shadow 0.15s, color 0.15s;
    }
    .recenter-btn:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.3); color: var(--blue); }

    /* ── ADD BUTTON (desktop) ── */
    .add-btn {
      position: absolute; bottom: 20px; right: 16px;
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--blue); color: white;
      font-size: 26px; font-weight: 300; border: none; cursor: pointer;
      box-shadow: 0 2px 6px rgba(60,64,67,0.35), 0 4px 12px rgba(60,64,67,0.18);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; transition: box-shadow 0.15s, transform 0.15s; line-height: 1;
    }
    .add-btn:hover { box-shadow: 0 4px 12px rgba(60,64,67,0.45); transform: translateY(-1px); }

    /* Mobile-only elements hidden by default */
    .mobile-sheet { display: none; }
    .bottom-nav { display: none; }
    #buddy-btn { display: none; }
    #buddy-panel { display: none; }
    #buddy-backdrop { display: none; }

    /* ── DRAWER ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(32,33,36,0.45);
      z-index: 2000; display: none; align-items: flex-end;
    }
    .overlay.open { display: flex; }
    .drawer {
      background: var(--card); border-radius: 24px 24px 0 0;
      width: 100%; height: 80vh; overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .drawer-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 14px auto 0; flex-shrink: 0;
    }
    /* ── ADD FORM ── */
    .add-section {
      padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .add-inline-row {
      display: flex; align-items: center; gap: 10px;
      padding: 15px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .add-row-label {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text2); margin-bottom: 10px;
    }
    .add-inline-row .add-row-label { margin-bottom: 0; min-width: 40px; flex-shrink: 0; }
    .add-row-input {
      flex: 1; border: none; outline: none; font-size: 16px;
      color: var(--text); background: transparent; font-family: inherit;
    }
    .add-row-input::placeholder { color: var(--text3); }
    .add-person-chips {
      display: flex; flex-wrap: wrap; gap: 7px; align-items: center;
    }
    .add-chip {
      padding: 6px 15px; border-radius: 20px; font-size: 13px; font-weight: 500;
      border: 1.5px solid var(--border); cursor: pointer;
      color: var(--text2); background: transparent;
      -webkit-tap-highlight-color: transparent; transition: all 0.12s;
      font-family: inherit;
    }
    .add-chip.new-chip { color: var(--text3); border-style: dashed; }
    .add-new-name-input {
      border: none; border-bottom: 1.5px solid var(--blue); outline: none;
      font-size: 14px; padding: 4px 2px; background: transparent;
      color: var(--text); font-family: inherit; min-width: 70px; max-width: 120px;
    }
    .add-places-section {
      flex: 1; display: flex; flex-direction: column; padding: 14px 20px 0; min-height: 0;
    }
    .add-places-textarea {
      flex: 1; border: none; outline: none; resize: none; min-height: 100px;
      font-size: 15px; line-height: 1.7; color: var(--text);
      background: transparent; font-family: inherit; padding: 4px 0;
    }
    .add-places-textarea::placeholder { color: var(--text3); }
    .add-go-btn {
      margin: 14px 20px 32px; background: var(--blue); color: white;
      border: none; border-radius: 24px; padding: 15px;
      font-size: 16px; font-weight: 600; width: calc(100% - 40px);
      cursor: pointer; font-family: 'Google Sans', sans-serif;
      -webkit-tap-highlight-color: transparent; flex-shrink: 0;
    }
    .add-go-btn:active { opacity: 0.88; }

    /* ── PARSE RESULTS ── */
    .parse-results { padding: 0 20px 32px; }
    .parse-result-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; margin-bottom: 10px;
    }
    .parse-result-item .item-name {
      font-family: 'Google Sans', sans-serif; font-weight: 500;
      font-size: 15px; margin-bottom: 10px; color: var(--text);
    }

    /* ── MODALS ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(32,33,36,0.5);
      z-index: 3000; display: none;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); border-radius: 8px;
      width: 100%; max-width: 480px; max-height: 90vh;
      overflow-y: auto; padding: 24px;
      box-shadow: 0 8px 24px rgba(60,64,67,.25);
    }
    .modal h2 {
      font-family: 'Google Sans', sans-serif;
      font-size: 18px; font-weight: 400; margin-bottom: 20px;
    }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* Detail modal overlay transparent to events except on the modal itself */
    #detail-overlay { pointer-events: none; }
    #detail-overlay .modal { pointer-events: auto; }

    /* Detail modal specifics */
    .detail-header { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 20px; }
    .detail-icon { flex-shrink: 0; }
    .detail-name {
      font-family: 'Google Sans', sans-serif;
      font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 4px;
    }
    .detail-meta { font-size: 13px; color: var(--text2); }
    .detail-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 0; border-top: 1px solid var(--border); font-size: 14px;
    }
    .detail-row-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
    .detail-row a { color: var(--blue); text-decoration: none; }
    .detail-row a:hover { text-decoration: underline; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: white; padding: 10px 20px;
      border-radius: 4px; font-size: 13px; z-index: 5000;
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
      white-space: nowrap; box-shadow: var(--shadow-md);
    }
    .toast.show { opacity: 1; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════════════════════════════
       MOBILE LAYOUT
    ════════════════════════════════ */
    @media (hover: none) and (pointer: coarse) {
      body { background: #000; }

      #left-panel { display: none !important; }

      #app { position: fixed; inset: 0; overflow: hidden; background: #000; }

      /* Map fills full screen — nav floats on top */
      .main-content {
        position: fixed; top: 0; left: 0; right: 0;
        bottom: 0; z-index: 1;
      }
      #map-view { display: block !important; position: absolute; inset: 0; }

      /* ── FLOATING SEARCH BAR ── */
      .map-search-bar {
        position: fixed; top: 12px; left: 12px; right: 12px;
        display: flex; flex-direction: column; gap: 6px;
        background: white; border-radius: 28px;
        padding: 14px 14px 10px;
        box-shadow: 0 2px 12px rgba(26,115,232,0.28), 0 1px 4px rgba(26,115,232,0.15);
        z-index: 600; /* above sheet (300) and nav (500) */
      }
      .map-search-top {
        display: flex; align-items: center; gap: 8px;
      }
      .map-search-top input {
        flex: 1; border: none; outline: none; box-shadow: none;
        font-size: 15px; background: transparent;
        color: var(--text); font-family: 'Roboto', Arial, sans-serif;
      }
      .map-search-top input::placeholder { color: var(--text3); }
      .map-search-top input:focus { border: none; box-shadow: none; }
      .map-search-top input[type="search"]::-webkit-search-cancel-button,
      .map-search-top input[type="search"]::-webkit-search-decoration { display: none; }
      /* Search suggestions dropdown */
      .search-suggestions {
        position: fixed; left: 12px; right: 12px; top: 70px; /* updated dynamically */
        background: white; border-radius: 12px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.18);
        z-index: 601; overflow: hidden; display: none;
      }
      .search-suggestions.visible { display: block; }

      /* Push Leaflet zoom controls above the nav bar */
      .leaflet-bottom.leaflet-right { bottom: 115px !important; }
      .suggestion-item {
        padding: 12px 16px; font-size: 14px; cursor: pointer;
        border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center;
      }
      .suggestion-item:last-child { border-bottom: none; }
      .suggestion-item:active { background: var(--bg); }

      /* Recenter: injected into Leaflet zoom bar via JS; hide the fixed button */
      .recenter-btn { display: none !important; }

      /* Leaflet recenter button inside zoom bar */
      .leaflet-recenter-btn {
        display: flex !important; align-items: center; justify-content: center;
        border-top: 1px solid #ccc !important;
      }
      .leaflet-recenter-btn:hover { color: var(--blue); }
      .recenter-icon-fit { display: none; }
      .recenter-icon-locate { display: block; }

      /* ── BOTTOM SHEET ── */
      .mobile-sheet {
        display: flex; flex-direction: column;
        position: fixed; left: 0; right: 0; bottom: 107px;
        top: 130px;
        background: white; border-radius: 16px 16px 0 0;
        z-index: 300;
        transform: translateY(100%);
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
        overflow: hidden;
        will-change: transform;
      }
      .mobile-sheet.open { transform: translateY(0); }

      .mobile-sheet-handle {
        width: 36px; height: 4px; background: var(--border);
        border-radius: 2px; margin: 12px auto 6px; flex-shrink: 0; cursor: pointer;
      }

      .mobile-list-body {
        flex: 1; overflow-y: auto;
        padding: 0;
        -webkit-overflow-scrolling: touch;
      }

      /* Mobile list: full-width rows with dividers, no card styling */
      .mobile-list-body .rec-card {
        background: transparent; border: none; border-radius: 0;
        border-bottom: 1px solid var(--border); margin-bottom: 0;
        box-shadow: none; padding: 13px 16px;
      }
      .mobile-list-body .rec-card:last-child { border-bottom: none; }
      .mobile-list-body .rec-name { font-size: 14px; }

      /* Swipe-to-delete card styles */
      .mobile-list-body .rec-card { transition: transform 0.15s ease, opacity 0.15s ease; }

      /* ── BOTTOM NAV ── */
      .bottom-nav {
        display: flex; position: fixed;
        bottom: 0; left: 0; right: 0; height: 107px;
        background: white; border-top: 1px solid var(--border); z-index: 500;
      }
      .nav-btn {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 0;
        border: none; background: none; color: var(--text);
        font-family: 'Google Sans', sans-serif; cursor: pointer;
        padding: 8px 4px 10px; transition: color 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .nav-pill {
        padding: 4px 18px; border-radius: 16px; margin-bottom: 3px;
        transition: background 0.2s;
        display: flex; align-items: center; justify-content: center;
      }
      .nav-btn.active .nav-pill { background: var(--blue-light); }
      .nav-btn.active { color: var(--blue); }
      .nav-btn svg { display: block; }
      .nav-icon-img { width: 24px; height: 24px; display: block; }
      .nav-label { font-size: 11px; font-weight: 500; }

      .nav-btn.active svg path, .nav-btn.active svg circle { fill: var(--blue) !important; }
      #nav-list svg path { fill: #3c4043; }
      #nav-add svg path { fill: #3c4043; }
      #nav-list.active svg path, #nav-add.active svg path { fill: var(--blue) !important; }

      /* Toast above bottom nav */
      .toast { bottom: 121px; }

      /* Modals on mobile: slide up from bottom */
      .modal-overlay { align-items: flex-end; padding: 0; }
      .modal { border-radius: 16px 16px 0 0; max-width: 100%; padding: 20px 20px 40px; }
      #detail-overlay.open { background: transparent; }

      /* Drawer on desktop */
      .drawer { border-radius: 16px; height: auto; max-height: 90vh; }

      /* ── BUDDY LIST ── */
      #buddy-btn {
        position: fixed; top: 70px; left: 0;
        z-index: 601;
        width: 44px; height: 80px;
        border-radius: 0 24px 24px 0;
        background: #fff; border: none;
        box-shadow: 2px 0 12px rgba(0,0,0,0.18), 1px 0 4px rgba(0,0,0,0.10);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        padding: 0;
      }
      #buddy-panel {
        position: fixed; top: 0; bottom: 0;
        left: 0; width: 32%; min-width: 180px;
        background: #111; color: white;
        z-index: 4000;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s;
        display: flex; flex-direction: column;
        box-shadow: none;
        overflow: hidden;
      }
      #buddy-panel.open {
        box-shadow: 4px 0 20px rgba(0,0,0,0.35);
      }
      #buddy-panel.open { transform: translateX(0); }
      #buddy-header {
        padding: 16px 12px 10px;
        background: #000;
        font-size: 12px; font-weight: 600; letter-spacing: .04em;
        color: #aaa; text-transform: uppercase;
        flex-shrink: 0;
      }
      #buddy-names { flex: 1; overflow-y: auto; padding: 8px 0; }
      .buddy-item {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 14px; cursor: pointer;
        font-size: 13px; color: #d0daf0;
        transition: background 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .buddy-item:active { background: rgba(255,255,255,0.08); }
      .buddy-item.muted { color: #555; font-style: italic; }
      .buddy-item.muted .buddy-name { text-decoration: none; }
      .buddy-folder-header {
        display: flex; align-items: center; gap: 8px;
        padding: 10px 14px 6px; cursor: pointer;
        border-top: 1px solid #1a1a1a;
        -webkit-tap-highlight-color: transparent;
      }
      .buddy-folder-header:active { background: rgba(255,255,255,0.05); }
      .buddy-me-row {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 14px; cursor: pointer;
        font-size: 13px; color: #d0daf0;
        border-bottom: 1px solid #1a1a1a;
        -webkit-tap-highlight-color: transparent;
      }
      .buddy-me-row:active { background: rgba(255,255,255,0.08); }
      .buddy-me-row.muted { color: #555; font-style: italic; }
      #buddy-footer {
        padding: 12px 14px 28px; border-top: 1px solid #222; flex-shrink: 0;
        display: flex; align-items: center; justify-content: flex-end;
      }
      #buddy-settings-btn {
        background: none; border: none; color: #5a7090; cursor: pointer;
        font-size: 16px; padding: 4px; line-height: 1;
        -webkit-tap-highlight-color: transparent;
      }
      #buddy-settings-popup {
        display: none; position: absolute; bottom: 60px; left: 12px; right: 12px;
        background: #161f2e; border-radius: 14px;
        box-shadow: 0 8px 28px rgba(0,0,0,0.5);
        overflow: hidden;
      }
      #buddy-settings-popup.visible { display: block; }
      .buddy-settings-row {
        display: flex; align-items: center; gap: 10px;
        padding: 13px 16px; cursor: pointer; color: #c8d8f0;
        font-size: 14px; border: none; background: none;
        width: 100%; text-align: left; font-family: inherit;
        -webkit-tap-highlight-color: transparent;
      }
      .buddy-settings-row:active { background: rgba(255,255,255,0.06); }
      .buddy-settings-row + .buddy-settings-row { border-top: 1px solid #1e2d42; }
      .buddy-settings-row.danger { color: #e8453c; }
      #buddy-backdrop {
        display: none; /* not used — map stays interactive while buddy is open */
      }
      #buddy-btn { display: flex; }
      #buddy-panel { display: flex; }
    }

    /* ════════════════════════════════
       DESKTOP LAYOUT
    ════════════════════════════════ */
    @media (hover: hover) and (pointer: fine) {
      body { overflow: hidden; }
      #app { flex-direction: row; height: 100vh; }

      #left-panel {
        display: flex; flex-direction: column;
        width: 380px; min-width: 320px; flex-shrink: 0;
        height: 100vh; border-right: 1px solid var(--border);
        background: var(--card); position: relative; z-index: 10;
      }

      .filter-bar { flex-direction: column; gap: 6px; padding: 10px 12px; }
      .filter-bar input[type=text] { min-width: unset; border-radius: 20px; }
      .filter-row { display: flex; gap: 6px; }
      /* Apple-style filter selects on desktop */
      .filter-row select {
        flex: 1; font-size: 12px;
        border: 1px solid var(--border); border-radius: 20px;
        padding: 6px 10px; background: var(--bg);
        appearance: none; -webkit-appearance: none;
        cursor: pointer;
      }

      #list-view { display: block !important; flex: 1; overflow-y: auto; padding: 8px 12px 80px; }

      .main-content { flex: 1; position: relative; }
      #map-view { display: block !important; position: absolute; inset: 0; }

      .mobile-sheet { display: none !important; }
      .bottom-nav { display: none !important; }
      .map-search-bar { display: none !important; }
      .search-suggestions { display: none !important; }

      .overlay { align-items: center; justify-content: center; }
      .drawer { border-radius: 16px; max-width: 500px; height: auto; max-height: 90vh; }

      .rec-card { padding: 8px 12px; margin-bottom: 4px; }
      .tag { font-size: 11px; padding: 2px 8px; }
      /* Header count hidden until searching */
      .header-count { display: none; }

      /* Recenter on desktop: bottom-left, fit-all icon */
      .recenter-btn { bottom: 20px; left: 10px; }
      .recenter-icon-fit { display: block; }
      .recenter-icon-locate { display: none; }
    }

    @media (min-width: 600px) and (hover: none) {
      .overlay { align-items: center; justify-content: center; padding: 20px; }
      .drawer { border-radius: 16px; max-width: 560px; height: auto; max-height: 90vh; }
      .modal-overlay { align-items: center; padding: 20px; }
      .modal { border-radius: 8px; }
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="64" height="64"><defs><clipPath id="a-tongue"><path d="M 42 28 Q 30 28 30 40 L 30 88 Q 30 158 100 160 Q 170 158 170 88 L 170 40 Q 170 28 158 28 Z"/></clipPath><radialGradient id="a-ts" cx="48%" cy="38%" r="65%" fx="48%" fy="35%"><stop offset="0%" stop-color="#EA4335"/><stop offset="70%" stop-color="#EA4335"/><stop offset="100%" stop-color="#c0291c"/></radialGradient></defs><rect width="200" height="200" fill="white"/><g transform="translate(100,105) scale(0.8) translate(-100,-96)" clip-path="url(#a-tongue)"><path d="M 42 28 Q 30 28 30 40 L 30 88 Q 30 158 100 160 Q 170 158 170 88 L 170 40 Q 170 28 158 28 Z" fill="url(#a-ts)"/><rect x="42" y="43" width="116" height="6" rx="3" fill="white"/><rect x="97.5" y="43" width="5" height="90" rx="2.5" fill="white"/></g></svg></div>
    <h1>Taste</h1>
    <p class="subtitle">Your favorite people's favorite places.</p>
    <div id="auth-form">
      <div class="field" id="name-field" style="display:none">
        <label>Your Name</label>
        <input type="text" id="auth-name" placeholder="Rob" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="auth-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="auth-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary btn-full" onclick="submitAuth()">Sign In</button>
    </div>
    <div class="auth-toggle">
      <span id="auth-toggle-text">Don't have an account?</span>
      <a onclick="toggleAuthMode()"> <span id="auth-toggle-link">Sign up</span></a>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- LEFT PANEL (desktop only) -->
  <div id="left-panel">
    <header>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="28" height="28" class="header-logo"><defs><clipPath id="h-tongue"><path d="M 42 28 Q 30 28 30 40 L 30 88 Q 30 158 100 160 Q 170 158 170 88 L 170 40 Q 170 28 158 28 Z"/></clipPath><radialGradient id="h-ts" cx="48%" cy="38%" r="65%" fx="48%" fy="35%"><stop offset="0%" stop-color="#EA4335"/><stop offset="70%" stop-color="#EA4335"/><stop offset="100%" stop-color="#c0291c"/></radialGradient></defs><rect width="200" height="200" fill="white"/><g transform="translate(100,105) scale(0.8) translate(-100,-96)" clip-path="url(#h-tongue)"><path d="M 42 28 Q 30 28 30 40 L 30 88 Q 30 158 100 160 Q 170 158 170 88 L 170 40 Q 170 28 158 28 Z" fill="url(#h-ts)"/><rect x="42" y="43" width="116" height="6" rx="3" fill="white"/><rect x="97.5" y="43" width="5" height="90" rx="2.5" fill="white"/></g></svg>
      <h1>Taste</h1>
      <span class="header-count" id="rec-count"></span>
      <button id="fix-location-btn" onclick="runFixNoLocation()" title="Retry finding locations for ⚠️ places" style="display:none;align-items:center;gap:4px;background:none;border:1px solid #f5a623;border-radius:14px;color:#f5a623;font-size:11px;padding:3px 8px;cursor:pointer;white-space:nowrap">⚠️ Retry locations</button>
    </header>
    <div class="filter-bar" id="filter-bar">
      <input type="text" id="search-input" placeholder="Search places…"
        enterkeyhint="search" inputmode="search"
        oninput="applyFilters()" onkeydown="handleSearchKey(event)" />
      <div class="filter-row">
        <select id="filter-city"   onchange="applyFilters()"><option value="">All cities</option></select>
        <select id="filter-type"   onchange="applyFilters()"><option value="">All types</option></select>
        <select id="filter-person" onchange="applyFilters()"><option value="">Everyone</option></select>
      </div>
    </div>
    <div id="list-view"></div>
    <button class="add-btn" onclick="openAddDrawer()">+</button>
  </div>

  <!-- MAP -->
  <div class="main-content">
    <div id="map-view">
      <div id="map"></div>
      <!-- Desktop: fit all markers. Mobile: go to current location -->
      <button class="recenter-btn" id="recenter-btn" onclick="recenterBtnClick()" title="My location">
        <!-- Fit-all icon (desktop) -->
        <svg class="recenter-icon-fit" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"></polyline>
          <polyline points="9 21 3 21 3 15"></polyline>
          <line x1="21" y1="3" x2="14" y2="10"></line>
          <line x1="3" y1="21" x2="10" y2="14"></line>
        </svg>
        <!-- Locate icon (mobile) -->
        <svg class="recenter-icon-locate" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/><circle cx="12" cy="12" r="8" stroke-opacity=".3"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- FLOATING SEARCH BAR (mobile only, fixed above everything) -->
  <div class="map-search-bar" id="map-search-bar">
    <form class="map-search-top" autocomplete="off" onsubmit="return false">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;color:var(--text2)">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="map-search-input" placeholder="Search places, cities, people…"
        enterkeyhint="go" inputmode="search"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        data-form-type="other"
        oninput="onSearchInput(this.value)"
        onkeydown="handleSearchKey(event)"
        onfocus="onSearchFocus()" />
      <button id="map-search-clear" onclick="clearMapSearch()" style="display:none;border:none;background:none;padding:0;cursor:pointer;color:var(--text3);line-height:1;font-size:20px;flex-shrink:0">×</button>
    </form>
  </div>
  <!-- Autocomplete suggestions -->
  <div class="search-suggestions" id="search-suggestions"></div>

  <!-- MOBILE BOTTOM SHEET -->
  <div class="mobile-sheet" id="mobile-sheet">
    <div class="mobile-sheet-handle" id="sheet-handle"></div>
    <div id="mobile-list-view" class="mobile-list-body"></div>
  </div>

  <!-- MOBILE BOTTOM NAV -->
  <div class="bottom-nav" id="bottom-nav">
    <button class="nav-btn active" id="nav-map" onclick="setMode('map')">
      <div class="nav-pill">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/>
        </svg>
      </div>
      <span class="nav-label">Map</span>
    </button>
    <button class="nav-btn" id="nav-list" onclick="setMode('list')">
      <div class="nav-pill">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
      </div>
      <span class="nav-label">List</span>
    </button>
    <button class="nav-btn" id="nav-add" onclick="setMode('add')">
      <div class="nav-pill">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
        </svg>
      </div>
      <span class="nav-label">Add</span>
    </button>
  </div>

</div><!-- #app -->

<!-- BUDDY LIST -->
<button id="buddy-btn" onclick="toggleBuddy()" title="Buddy List">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="26" height="26"><defs><clipPath id="b-tongue"><path d="M 42 28 Q 30 28 30 40 L 30 88 Q 30 158 100 160 Q 170 158 170 88 L 170 40 Q 170 28 158 28 Z"/></clipPath><radialGradient id="b-ts" cx="48%" cy="38%" r="65%" fx="48%" fy="35%"><stop offset="0%" stop-color="#EA4335"/><stop offset="70%" stop-color="#EA4335"/><stop offset="100%" stop-color="#c0291c"/></radialGradient></defs><g transform="translate(100,105) scale(0.8) translate(-100,-96)" clip-path="url(#b-tongue)"><path d="M 42 28 Q 30 28 30 40 L 30 88 Q 30 158 100 160 Q 170 158 170 88 L 170 40 Q 170 28 158 28 Z" fill="url(#b-ts)"/><rect x="42" y="43" width="116" height="6" rx="3" fill="white"/><rect x="97.5" y="43" width="5" height="90" rx="2.5" fill="white"/></g></svg>
</button>
<div id="buddy-backdrop" onclick="closeBuddy()"></div>
<div id="buddy-panel">
  <div id="buddy-header">Filter</div>
  <div id="buddy-names"></div>
  <div id="buddy-footer" style="position:relative">
    <button id="buddy-settings-btn" onclick="toggleBuddySettings()" title="Settings">
      <svg viewBox="0 0 24 24" fill="#555" width="18" height="18"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.63-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>
    <div id="buddy-settings-popup">
      <button class="buddy-settings-row" onclick="resetBuddyList()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Reset filters
      </button>
      <button class="buddy-settings-row danger" onclick="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Log out
      </button>
    </div>
  </div>
</div>

<!-- ADD DRAWER -->
<div class="overlay" id="add-overlay" onclick="closeAddDrawer(event)">
  <div class="drawer" id="add-drawer">
    <div class="drawer-handle" id="drawer-handle"></div>
    <div class="parse-area">
      <!-- Add to: person chips -->
      <div class="add-section">
        <div class="add-row-label">Add to</div>
        <div class="add-person-chips" id="add-person-chips"></div>
      </div>
      <!-- City -->
      <div class="add-inline-row">
        <span class="add-row-label">City</span>
        <input type="text" id="input-city" placeholder="Anywhere" list="city-suggestions" autocomplete="off" class="add-row-input" />
        <datalist id="city-suggestions"></datalist>
      </div>
      <!-- Places textarea -->
      <div class="add-places-section">
        <div class="add-row-label">Places</div>
        <textarea id="raw-input" class="add-places-textarea" placeholder="Paste texts, links, lists, Instagram posts…"></textarea>
      </div>
      <button class="add-go-btn" onclick="parseInput()" id="parse-btn">Add</button>
    </div>
    <div id="parse-results" class="parse-results"></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-overlay">
  <div class="modal" style="position:relative">
    <!-- Top-right: maps icons + close -->
    <div style="position:absolute;top:12px;right:12px;display:flex;align-items:center;gap:10px">
      <a id="detail-apple-maps-link" href="" target="_blank" title="Open in Apple Maps" style="display:flex;align-items:center">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none"><rect width="24" height="24" rx="5" fill="#1C86EE"/><path d="M12 4C8.13 4 5 7.13 5 11c0 3.5 4 9 7 11 3-2 7-7.5 7-11 0-3.87-3.13-7-7-7z" fill="white" opacity=".9"/><circle cx="12" cy="11" r="2.5" fill="#1C86EE"/></svg>
      </a>
      <a id="detail-google-maps-link" href="" target="_blank" title="Open in Google Maps" style="display:flex;align-items:center">
        <svg viewBox="0 0 24 24" width="24" height="24"><rect width="24" height="24" rx="5" fill="#fff"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#EA4335"/><circle cx="12" cy="9" r="2.5" fill="white"/></svg>
      </a>
    </div>
    <div class="detail-header" style="padding:0 64px 0 0;margin-bottom:20px">
      <div class="detail-icon" id="detail-icon"></div>
      <div style="flex:1;min-width:0">
        <div class="detail-name" id="detail-name"></div>
        <div class="detail-meta" id="detail-meta"></div>
      </div>

<script>

  church: '<path d="M9 22h6v-6.586l-3-3-3 3V22zm3-20L9 5v2H7v2h2v2.172l-5 5V22h2v-5.172l4-4 4 4V22h2v-5.828l-5-5V9h2V7h-2V5l-3-3z"/>',
