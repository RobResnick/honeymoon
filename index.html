function typeIconHtml(type, size = 26, overrideColor) {
  const color = overrideColor || TYPE_COLORS[type] || '#5f6368';
  const path = TYPE_PATHS[type] || TYPE_PATHS.other;
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:0"><svg viewBox="0 0 24 24" width="${Math.round(size*0.54)}" height="${Math.round(size*0.54)}" fill="white" style="display:block">${path}</svg></div>`;
}

let sessionToken = localStorage.getItem('hm_token') || null;
let allRecs = [], filtered = [], allPeople = [];
let _pendingCoords = new Set(); // rec IDs at city-level, geocode not yet attempted (show ⏳)
let _failedCoords = new Set();  // rec IDs at city-level, geocode attempted + failed (show ⚠️)
let _addSelectedPeople = new Set(), _editSelectedPeople = new Set();
let map = null, markers = [], locationDot = null;
let authMode = 'login';
let pendingParseCount = 0, pendingRawInput = '';

// ── SOURCE / FOLDER COLOR SYSTEM ──
let _currentUser = null;
const FOLDER_COLORS = { me: '#1A73E8', friends: '#f29900', internet: '#34A853', other: '#e8453c' };
const FOLDER_LABELS = { me: 'Me', friends: 'Friends', internet: 'Internet', other: 'Other' };
let _buddyFolders = JSON.parse(localStorage.getItem('hm_buddy_folders') || '{"friends":[],"internet":[],"other":[]}');
let _folderStates = JSON.parse(localStorage.getItem('hm_folder_states') || '{"friends":true,"internet":true,"other":true}');
let _folderExpanded = JSON.parse(localStorage.getItem('hm_folder_expanded') || '{"friends":true,"internet":true,"other":true}');
let _hiddenPeople = new Set(JSON.parse(localStorage.getItem('hm_hidden_people') || '[]'));
let _draggingPerson = null;
let _userLocation = null; // { lat, lng } set when geolocation resolves
let _folderOrder = JSON.parse(localStorage.getItem('hm_folder_order') || '["friends","internet","other"]');
let _folderLabels = JSON.parse(localStorage.getItem('hm_folder_labels') || '{"friends":"Friends","internet":"Internet","other":"Other"}');
let _personColors = JSON.parse(localStorage.getItem('hm_person_colors') || '{}');
let _cityCoords = {}; // city name (lowercase) → {latitude, lng} from /api/city-coords

// Color palette for unassigned people — distinct, not too dark/light
const PERSON_PALETTE = ['#9334E6','#00897B','#FF6D00','#C62828','#1565C0','#558B2F','#F06292','#0288D1','#6D4C41','#546E7A'];

// Distance between two lat/lng points in km
function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
// 3 miles in km
const NEARBY_KM = 4.83;

function isMe(name) {
  if (!name) return false;
  if (name.toLowerCase() === 'me') return true; // literal "Me" in recommended_by = current user
  return !!(_currentUser && (name === _currentUser.name || name.toLowerCase() === (_currentUser.name||'').toLowerCase()));
}

function getPersonFolder(name) {
  if (!name) return 'other';
  if (isMe(name)) return 'me';
  for (const fid of _folderOrder) {
    if ((_buddyFolders[fid] || []).includes(name)) return fid;
  }
  return 'other';
}

function getPersonColor(name) {
  if (!name) return FOLDER_COLORS.other;
  if (isMe(name)) return FOLDER_COLORS.me;
  const folder = getPersonFolder(name);
  if (folder !== 'other') return FOLDER_COLORS[folder];
  // Unassigned: use stored color or assign new one from palette
  if (!_personColors[name]) {
    const used = new Set(Object.values(_personColors));
    const pick = PERSON_PALETTE.find(c => !used.has(c)) || PERSON_PALETTE[Object.keys(_personColors).length % PERSON_PALETTE.length];
    _personColors[name] = pick;
    localStorage.setItem('hm_person_colors', JSON.stringify(_personColors));
  }
  return _personColors[name];
}

function getRecSourceColor(rec) {
  if (!rec.recommended_by) return FOLDER_COLORS.other;
  const people = rec.recommended_by.split(',').map(p => p.trim()).filter(Boolean);
  if (!people.length) return FOLDER_COLORS.other;
  return getPersonColor(people[0]);
}

function isPersonVisible(name) {
  if (!name) return true;
  if (isMe(name)) return !_hiddenPeople.has('__me__'); // canonical key, covers "Me" and real username
  if (_hiddenPeople.has(name)) return false;
  const folder = getPersonFolder(name);
  if (_folderStates[folder] === false) return false;
  return true;
}

const isDesktop = () => window.matchMedia('(hover: hover) and (pointer: fine)').matches;

// ── AUTH ──
function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  document.getElementById('name-field').style.display = authMode === 'register' ? 'block' : 'none';
  document.querySelector('#auth-form button').textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-toggle-text').textContent = authMode === 'login' ? "Don't have an account?" : 'Already have an account?';
  document.getElementById('auth-toggle-link').textContent = authMode === 'login' ? 'Sign up' : 'Sign in';
}

async function submitAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const name = document.getElementById('auth-name').value.trim();
  if (!email || !password) return showToast('Email and password required');
  const endpoint = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
  const body = authMode === 'login' ? { email, password } : { email, password, name };
  const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) return showToast(data.error || 'Error');
  sessionToken = data.token;
  localStorage.setItem('hm_token', sessionToken);
  _currentUser = data.user;
  showApp();
}

async function logout() {
  await api('/api/auth/logout', 'POST');
  localStorage.removeItem('hm_token');
  sessionToken = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

async function api(url, method = 'GET', body = null) {
  const opts = { method, headers: { 'x-session-token': sessionToken } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(url, opts);
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

async function loadPeople() {
  const data = await api('/api/people');
  if (Array.isArray(data)) allPeople = data;
}

async function loadBuddySettings() {
  const data = await api('/api/buddy-settings');
  if (!data) return; // no saved settings yet — keep localStorage defaults
  if (data.buddyFolders)  { _buddyFolders  = data.buddyFolders;  localStorage.setItem('hm_buddy_folders',  JSON.stringify(_buddyFolders)); }
  if (data.folderOrder)   { _folderOrder   = data.folderOrder;   localStorage.setItem('hm_folder_order',   JSON.stringify(_folderOrder)); }
  if (data.folderLabels)  { _folderLabels  = data.folderLabels;  localStorage.setItem('hm_folder_labels',  JSON.stringify(_folderLabels)); }
  if (data.folderStates)  { _folderStates  = data.folderStates;  localStorage.setItem('hm_folder_states',  JSON.stringify(_folderStates)); }
  if (data.folderExpanded){ _folderExpanded= data.folderExpanded;localStorage.setItem('hm_folder_expanded',JSON.stringify(_folderExpanded)); }
  if (data.hiddenPeople)  { _hiddenPeople  = new Set(data.hiddenPeople); localStorage.setItem('hm_hidden_people', JSON.stringify(data.hiddenPeople)); }
  if (data.personColors)  { _personColors  = data.personColors;  localStorage.setItem('hm_person_colors',  JSON.stringify(_personColors)); }
}

let _saveBuddyTimer = null;
function saveBuddySettings() {
  // Debounce — wait 800ms after last change before writing to server
  clearTimeout(_saveBuddyTimer);
  _saveBuddyTimer = setTimeout(() => {
    api('/api/buddy-settings', 'POST', {
      buddyFolders:  _buddyFolders,
      folderOrder:   _folderOrder,
      folderLabels:  _folderLabels,
      folderStates:  _folderStates,
      folderExpanded:_folderExpanded,
      hiddenPeople:  [..._hiddenPeople],
      personColors:  _personColors,
    });
  }, 800);
}

async function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  await Promise.all([loadRecs(), loadPeople(), loadBuddySettings()]);
  await loadFilters();
  // Fetch city-level coords (fast, cached server-side) — lets all places show on map
  api('/api/city-coords').then(data => {
    if (data) {
      _cityCoords = data;
      if (map) renderMapMarkers();
      // Re-run after city coords load so ⚠️ detection can compare against city centers
      detectCoordState();
      renderList();
      renderMobileList();
      const fixBtn = document.getElementById('fix-location-btn');
      if (fixBtn) fixBtn.style.display = _failedCoords.size > 0 ? 'inline-flex' : 'none';
      // Auto-fix any ⏳ (pending) places in the background
      autoFixIfNeeded();
    }
  });
  // Leaflet needs the container to be painted before it can measure dimensions.
  // Double-rAF ensures the browser has flushed the layout from display:flex,
  // then we give an extra 50ms for any CSS transitions to settle.
  requestAnimationFrame(() => requestAnimationFrame(() => {
    setTimeout(() => {
      if (map) {
        map.invalidateSize();
      } else if (!isDesktop()) {
        initMap();
      }
      // Belt-and-suspenders: a second invalidate in case tiles hadn't started yet
      setTimeout(() => map && map.invalidateSize(), 400);
    }, 50);
  }));
}

async function checkSession() {
  if (!sessionToken) return;
  showApp();
  const me = await api('/api/auth/me');
  if (!me) {
    localStorage.removeItem('hm_token');
    sessionToken = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
  } else {
    _currentUser = me;
    // Re-render markers so source colors (me=blue) are applied correctly
    if (map) renderMapMarkers();
  }
}

// ── FILTERS ──
function getFilterValues() {
  if (isDesktop()) {
    return {
      search: document.getElementById('search-input').value.trim().toLowerCase(),
      city:   document.getElementById('filter-city').value.toLowerCase(),
      type:   document.getElementById('filter-type').value,
      person: document.getElementById('filter-person').value.toLowerCase(),
    };
  }
  return {
    search: document.getElementById('map-search-input').value.trim().toLowerCase(),
    city:   document.getElementById('mobile-city')?.value?.toLowerCase() || '',
    type:   document.getElementById('mobile-type')?.value || '',
    person: document.getElementById('mobile-person')?.value?.toLowerCase() || '',
  };
}

function recenterBtnClick() {
  if (isDesktop()) recenterMap();
  else goToCurrentLocation();
}

function expandSearchFilters() {
  document.getElementById('map-search-bar')?.classList.add('expanded');
  // Suggestions need repositioning
  const bar = document.getElementById('map-search-bar');
  const sugg = document.getElementById('search-suggestions');
  if (bar && sugg) sugg.style.top = (12 + bar.offsetHeight + 4) + 'px';
}

function collapseSearchFilters() {
  const sheet = document.getElementById('mobile-sheet');
  const hasSearch = document.getElementById('map-search-input')?.value.trim();
  if (!hasSearch && !sheet?.classList.contains('open')) {
    document.getElementById('map-search-bar')?.classList.remove('expanded');
  }
}

function clearMapSearch() {
  const inp = document.getElementById('map-search-input');
  inp.value = '';
  document.getElementById('map-search-clear').style.display = 'none';
  hideSuggestions();
  collapseSearchFilters();
  if (_sheetOpenedBySearch) {
    _sheetOpenedBySearch = false;
    const sheet = document.getElementById('mobile-sheet');
    sheet.classList.remove('open');
    document.getElementById('nav-list').classList.remove('active');
    document.getElementById('nav-map').classList.add('active');
    enableMapInteraction();
  }
  applyFilters();
  inp.blur();
}

let _sheetOpenedBySearch = false;

function handleSearchKey(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    hideSuggestions();
    applyFilters();
    const q = e.target.value.trim();
    if (q) { saveRecentSearch(q); jumpToSearch(q); }
    e.target.blur();
    // If search auto-opened the sheet, close it on Enter
    if (_sheetOpenedBySearch) {
      _sheetOpenedBySearch = false;
      const sheet = document.getElementById('mobile-sheet');
      sheet.classList.remove('open');
      document.getElementById('nav-list').classList.remove('active');
      document.getElementById('nav-map').classList.add('active');
      document.getElementById('map-search-bar')?.classList.remove('expanded');
    }
  }
}

async function jumpToSearch(q) {
  if (!map) return;
  const lq = q.toLowerCase();
  // 1. Match a city in our data → filter + pan to it
  const cityMatch = allRecs.find(r => r.city && r.city.toLowerCase() === lq);
  if (cityMatch && cityMatch.latitude && cityMatch.longitude) {
    map.setView([cityMatch.latitude, cityMatch.longitude], 13); return;
  }
  // 2. Match a place name → pan to it
  const placeMatch = allRecs.find(r => r.name.toLowerCase().includes(lq) && r.latitude);
  if (placeMatch) {
    map.setView([placeMatch.latitude, placeMatch.longitude], 15); return;
  }
  // 3. Geocode via Nominatim
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`, {
      headers: { 'Accept-Language': 'en' }
    });
    const data = await res.json();
    if (data && data[0]) map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 13);
  } catch(e) {}
}

function onSearchFocus() {
  // Close buddy panel when user taps search
  const buddy = document.getElementById('buddy-panel');
  if (buddy && buddy.classList.contains('open')) closeBuddy();
  const val = document.getElementById('map-search-input')?.value || '';
  document.getElementById('map-search-clear').style.display = val ? 'block' : 'none';
  if (val.length > 1) showSuggestions(val);
  if (!isDesktop()) {
    expandSearchFilters();
    const sheet = document.getElementById('mobile-sheet');
    if (!sheet.classList.contains('open')) {
      _sheetOpenedBySearch = true;
      sheet.classList.add('open');
      document.getElementById('nav-list').classList.add('active');
      document.getElementById('nav-map').classList.remove('active');
      renderMobileList();
      disableMapInteraction();
    }
  }
}

function onSearchInput(val) {
  document.getElementById('map-search-clear').style.display = val ? 'block' : 'none';
  applyFilters();
  if (val.length > 0) {
    expandSearchFilters();
    // Auto-open list sheet while typing (on mobile, map view only)
    if (!isDesktop()) {
      const sheet = document.getElementById('mobile-sheet');
      if (!sheet.classList.contains('open')) {
        _sheetOpenedBySearch = true;
        sheet.classList.add('open');
        document.getElementById('nav-list').classList.add('active');
        document.getElementById('nav-map').classList.remove('active');
      }
    }
  } else {
    hideSuggestions();
    collapseSearchFilters();
    if (_sheetOpenedBySearch) {
      _sheetOpenedBySearch = false;
      const sheet = document.getElementById('mobile-sheet');
      sheet.classList.remove('open');
      document.getElementById('nav-list').classList.remove('active');
      document.getElementById('nav-map').classList.add('active');
      enableMapInteraction();
    }
  }
  if (val.length > 1) showSuggestions(val);
  else hideSuggestions();
}

function showSuggestions(q) {
  if (!q) { hideSuggestions(); return; }
  // Don't show dropdown overlay when list sheet is open — list already filters live
  if (!isDesktop() && document.getElementById('mobile-sheet')?.classList.contains('open')) {
    hideSuggestions(); return;
  }
  const lq = q.toLowerCase();
  const box = document.getElementById('search-suggestions');
  if (!box) return;
  // Position just below the search bar
  const bar = document.getElementById('map-search-bar');
  if (bar) box.style.top = (12 + bar.offsetHeight + 4) + 'px';

  // Match place names and cities
  const placeMatches = allRecs
    .filter(r => r.name.toLowerCase().includes(lq) || (r.city||'').toLowerCase().includes(lq))
    .slice(0, 6);

  // Unique cities matching
  const citySet = new Set();
  allRecs.forEach(r => { if (r.city && r.city.toLowerCase().includes(lq)) citySet.add(r.city); });
  const cities = [...citySet].slice(0, 3);

  let html = '';
  cities.forEach(c => {
    html += `<div class="suggestion-item" onclick="selectCitySuggestion('${esc(c)}')">
      <span style="color:var(--text2);font-size:16px">📍</span>
      <span><strong>${esc(c)}</strong> <span style="color:var(--text2);font-size:12px">city</span></span>
    </div>`;
  });
  placeMatches.forEach(r => {
    const cleanName = r.name.replace(/^[\p{Emoji}\s]+/u, '').trim() || r.name;
    html += `<div class="suggestion-item" onclick="selectPlaceSuggestion(${r.id})">
      ${typeIconHtml(r.type, 18)}
      <span>${esc(cleanName)} ${r.city ? `<span style="color:var(--text2);font-size:12px">· ${esc(r.city)}</span>` : ''}</span>
    </div>`;
  });

  if (!html) { hideSuggestions(); return; }
  box.innerHTML = html;
  box.classList.add('visible');
}

function hideSuggestions() {
  const box = document.getElementById('search-suggestions');
  if (box) box.classList.remove('visible');
}

function saveRecentSearch(q) {
  if (!q || q.trim().length < 2) return;
  q = q.trim();
  let recent = JSON.parse(localStorage.getItem('hm_recent_searches') || '[]');
  recent = [q, ...recent.filter(s => s.toLowerCase() !== q.toLowerCase())].slice(0, 6);
  localStorage.setItem('hm_recent_searches', JSON.stringify(recent));
}
function getRecentSearches() {
  return JSON.parse(localStorage.getItem('hm_recent_searches') || '[]');
}
function applyRecentSearch(q) {
  const inp = document.getElementById('map-search-input');
  if (inp) inp.value = q;
  document.getElementById('map-search-clear').style.display = 'block';
  applyFilters();
  renderMobileList();
}

function selectCityInList(city) {
  // Jump to city, clear search, close list → land on the map
  hideSuggestions();
  saveRecentSearch(city);
  jumpToSearch(city);
  // Clear the search and close the list
  const inp = document.getElementById('map-search-input');
  if (inp) { inp.value = ''; inp.blur(); }
  document.getElementById('map-search-clear').style.display = 'none';
  _sheetOpenedBySearch = false;
  applyFilters();
  if (!isDesktop()) {
    const sheet = document.getElementById('mobile-sheet');
    sheet.classList.remove('open');
    document.getElementById('nav-list').classList.remove('active');
    document.getElementById('nav-map').classList.add('active');
    enableMapInteraction();
  }
}

function selectCitySuggestion(city) {
  const inp = document.getElementById('map-search-input');
  if (inp) inp.value = city;
  document.getElementById('map-search-clear').style.display = 'block';
  hideSuggestions();
  applyFilters();
  saveRecentSearch(city);
  jumpToSearch(city);
  if (!isDesktop()) closeSheetOnly();
}

function selectPlaceSuggestion(id) {
  hideSuggestions();
  const r = allRecs.find(x => x.id === id);
  if (!r) return;
  const inp = document.getElementById('map-search-input');
  if (inp) { inp.value = r.name.replace(/^[\p{Emoji}\s]+/u,'').trim()||r.name; }
  document.getElementById('map-search-clear').style.display = 'block';
  applyFilters();
  panToRec(id);
  if (!isDesktop()) closeSheetOnly();
}

function detectCoordState() {
  _pendingCoords = new Set();
  _failedCoords = new Set();
  const coordMap = {}; // "lat,lng" → [ids] for duplicate detection
  allRecs.forEach(r => {
    if (!r.latitude || !r.longitude) {
      // No coords at all — pending if not attempted, failed if attempted
      (r.geocode_attempted ? _failedCoords : _pendingCoords).add(r.id);
      return;
    }
    const lat = parseFloat(r.latitude), lng = parseFloat(r.longitude);
    // Check if coords are at city center (city-level fallback)
    const cityKey = (r.city || '').toLowerCase().trim();
    const cc = _cityCoords[cityKey];
    const atCityCenter = cc && Math.abs(lat - cc.latitude) < 0.05 && Math.abs(lng - cc.longitude) < 0.05;
    if (atCityCenter) {
      (r.geocode_attempted ? _failedCoords : _pendingCoords).add(r.id);
      return;
    }
    // Duplicate coords fallback (same lat/lng shared with another place)
    const key = lat.toFixed(5) + ',' + lng.toFixed(5);
    if (!coordMap[key]) coordMap[key] = [];
    coordMap[key].push({ id: r.id, attempted: r.geocode_attempted });
  });
  Object.values(coordMap).forEach(group => {
    if (group.length > 1) group.forEach(({ id, attempted }) =>
      (attempted ? _failedCoords : _pendingCoords).add(id)
    );
  });
}

async function loadRecs(fromServer = true) {
  if (fromServer) allRecs = await api('/api/recommendations') || [];
  detectCoordState();
  const { search, city, type, person } = getFilterValues();
  filtered = allRecs.filter(r => {
    if (city   && (r.city||'').toLowerCase() !== city) return false;
    if (type   && r.type !== type) return false;
    if (person && !(r.recommended_by||'').toLowerCase().split(',').map(p=>p.trim()).includes(person)) return false;
    if (search) {
      const hay = [r.name, r.city, r.notes, r.recommended_by].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    // Filter by buddy visibility — recommended_by is the source of truth
    if (r.recommended_by) {
      const people = r.recommended_by.split(',').map(p => p.trim()).filter(Boolean);
      if (people.length > 0 && people.every(p => !isPersonVisible(p))) return false;
    }
    return true;
  });
  renderList();
  if (map) renderMapMarkers();
  else updateSearchGlow(); // update glow even before map is initialized
  renderMobileList();
  document.getElementById('rec-count').textContent = filtered.length + (filtered.length === 1 ? ' place' : ' places');
  // Show fix button if there are ⚠️ (failed) places the user can manually retry
  const fixBtn = document.getElementById('fix-location-btn');
  if (fixBtn) fixBtn.style.display = _failedCoords.size > 0 ? 'inline-flex' : 'none';
  // Auto-fix any ⏳ (pending) places immediately
  if (Object.keys(_cityCoords).length > 0) autoFixIfNeeded();
}

async function loadFilters() {
  const data = await api('/api/filters');
  if (!data) return;
  ['filter-city','mobile-city'].forEach(id => fillSelect(id, data.cities));
  ['filter-type','mobile-type'].forEach(id => fillSelect(id, data.types));
  ['filter-person','mobile-person'].forEach(id => fillSelect(id, data.people));
  fillDatalist('city-suggestions', data.cities);
  fillDatalist('person-suggestions', data.people);
}

function fillDatalist(id, items) {
  const dl = document.getElementById(id);
  if (!dl) return;
  dl.innerHTML = items.map(v => `<option value="${esc(v)}">`).join('');
}

function fillSelect(id, items) {
  const sel = document.getElementById(id);
  if (!sel) return;
  const current = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  items.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v.charAt(0).toUpperCase() + v.slice(1);
    sel.appendChild(o);
  });
  if (current) sel.value = current;
}

let filterDebounce = null;
function applyFilters() {
  clearTimeout(filterDebounce);
  filterDebounce = setTimeout(() => loadRecs(false), 150);
}

// ── RENDER ──
function cardHtml(r) {
  const cleanName = r.name.replace(/^[\p{Emoji}\s]+/u, '').trim() || r.name;
  const person = r.recommended_by ? r.recommended_by.split(',')[0].trim() : '';
  const srcColor = getRecSourceColor(r);
  const tagStyle = `background:${srcColor}22;color:${srcColor};border:1px solid ${srcColor}55;`;
  return `
    <div class="rec-card" id="card-${r.id}" data-id="${r.id}" onclick="handleCardTap(${r.id})">
      <div class="rec-card-top">
        ${typeIconHtml(r.type, 28, srcColor)}
        <div class="rec-card-info">
          <div class="rec-name-line">
            <div class="rec-name">${esc(cleanName)}</div>
            ${_pendingCoords.has(r.id) ? `<span title="Finding location…" style="font-size:13px;opacity:0.6;flex-shrink:0">⏳</span>` : _failedCoords.has(r.id) ? `<span title="No precise location found" style="font-size:13px;opacity:0.7;flex-shrink:0">⚠️</span>` : ''}
            ${r.city ? `<div class="rec-city-text">· ${esc(r.city)}</div>` : ''}
            ${person ? `<div class="rec-person-tag" style="${tagStyle}">${esc(person)}</div>` : ''}
          </div>
        </div>
      </div>
    </div>`;
}

function renderList() {
  // Simple, safe render — used by both desktop and mobile
  const noRecs = `<div class="empty-state"><div class="emoji">🗺️</div><p>No recommendations yet.<br>Tap <strong>+</strong> to get started.</p></div>`;
  const html = !allRecs.length ? noRecs
    : (filtered.length ? filtered.map(cardHtml).join('') : '<div class="empty-state"><p>No matches.</p></div>');
  ['list-view', 'mobile-list-view'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = html;
  });
  if (!isDesktop()) initSwipeDelete();
}

// Mobile-only: viewport-filtered list with "recently added" fallback
// Called AFTER renderMapMarkers so it never blocks marker rendering
function renderMobileList() {
  if (isDesktop()) return;
  try {
    const mlv = document.getElementById('mobile-list-view');
    if (!mlv) return;
    const noMatch = '<div class="empty-state"><p>No matches.</p></div>';
    let html;
    if (!allRecs.length) {
      html = `<div class="empty-state"><div class="emoji">🗺️</div><p>No recommendations yet.<br>Tap <strong>+</strong> to get started.</p></div>`;
    } else {
      // If search/filter is active → show ALL matches, no viewport clipping
      // (avoids city results flashing then disappearing after map pans)
      const hasFilter = (document.getElementById('map-search-input')?.value.trim() || '')
        || document.getElementById('mobile-city')?.value
        || document.getElementById('mobile-type')?.value
        || document.getElementById('mobile-person')?.value;
      if (hasFilter) {
        // City suggestion rows at top
        const searchVal = (document.getElementById('map-search-input')?.value.trim() || '').toLowerCase();
        let cityHtml = '';
        if (searchVal) {
          const matchingCities = [...new Set(
            allRecs.filter(r => r.city && r.city.toLowerCase().includes(searchVal)).map(r => r.city)
          )];
          if (matchingCities.length) {
            cityHtml = matchingCities.map(c =>
              `<div style="display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:var(--bg)" onclick="selectCityInList('${esc(c)}')">
                <span style="font-size:16px">📍</span>
                <span style="font-size:14px;font-weight:500;font-family:'Google Sans',sans-serif">${esc(c)}</span>
                <span style="font-size:12px;color:var(--text3);margin-left:auto">city →</span>
              </div>`
            ).join('');
          }
        }
        html = cityHtml + (filtered.length ? filtered.map(cardHtml).join('') : noMatch);
      } else if (map) {
        // No filter → show only places in current map viewport
        const bounds = map.getBounds();
        const inBounds = filtered.filter(r => r.latitude && r.longitude
          && bounds.contains([parseFloat(r.latitude), parseFloat(r.longitude)]));
        const sectionLabel = s => `<div style="padding:10px 16px 4px;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">${s}</div>`;
        const recentSearches = getRecentSearches();
        const recentSearchHtml = recentSearches.length >= 10
          ? sectionLabel('Recently searched') +
            `<div style="display:flex;gap:8px;flex-wrap:wrap;padding:6px 16px 12px">` +
            recentSearches.map(s => `<button onclick="applyRecentSearch(this.dataset.q)" data-q="${esc(s)}" style="border:1px solid var(--border);background:var(--card);border-radius:20px;padding:4px 12px;font-size:13px;cursor:pointer;color:var(--text);font-family:inherit">${esc(s)}</button>`).join('') +
            `</div>`
          : '';
        // List = whatever dots are currently in the map frame
        if (inBounds.length > 0) {
          // "Nearby" label only if user location exists AND every visible dot is within 3 miles
          const allNearby = _userLocation && inBounds.every(r =>
            r.latitude && r.longitude &&
            haversineKm(_userLocation.lat, _userLocation.lng, parseFloat(r.latitude), parseFloat(r.longitude)) < NEARBY_KM
          );
          const label = allNearby ? sectionLabel('Nearby') : '';
          html = recentSearchHtml + label + inBounds.map(cardHtml).join('');
        } else {
          // Nothing in viewport (rare on load before location resolves)
          html = recentSearchHtml || noMatch;
        }
      } else {
        html = filtered.length ? filtered.map(cardHtml).join('') : noMatch;
      }
    }
    mlv.innerHTML = html;
    initSwipeDelete();
  } catch(e) {
    console.error('renderMobileList error:', e);
  }
}

// ── CARD INTERACTIONS ──
let _lastTapId = null, _lastTapTime = 0, _swipeBlocking = false;

function handleCardTap(id) {
  if (_swipeBlocking) return;
  // Single tap → pan to rec and open detail
  panToRec(id);
  openDetail(id);
}

// Close sheet + update nav WITHOUT triggering geolocation
function closeSheetOnly() {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-map').classList.add('active');
  document.getElementById('mobile-sheet').classList.remove('open');
  collapseSearchFilters();
  enableMapInteraction();
}

function panToRec(id) {
  const r = allRecs.find(x => x.id === id);
  if (!r) return;
  if (!isDesktop()) closeSheetOnly();
  if (map && r.latitude && r.longitude) {
    setTimeout(() => {
      map.invalidateSize();
      map.setView([parseFloat(r.latitude), parseFloat(r.longitude)], 16);
    }, 50);
  }
}

function initSwipeDelete() {
  ['mobile-list-view','list-view'].forEach(cid => {
    const container = document.getElementById(cid);
    if (!container) return;
    container.querySelectorAll('.rec-card').forEach(card => {
      let startX = 0, startY = 0, curX = 0, active = false, dirLocked = false, isHoriz = false;
      const id = parseInt(card.dataset.id);

      card.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        curX = 0; active = true; dirLocked = false; isHoriz = false;
        card.style.transition = 'none';
        _swipeBlocking = false;
      }, { passive: true });

      card.addEventListener('touchmove', e => {
        if (!active) return;
        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;
        if (!dirLocked && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
          dirLocked = true;
          isHoriz = Math.abs(dx) > Math.abs(dy) && dx < 0;
        }
        if (!isHoriz) return;
        curX = Math.min(0, dx);
        _swipeBlocking = true;
        card.style.transform = `translateX(${curX}px)`;
        const frac = Math.min(1, Math.abs(curX) / 120);
        card.style.background = `rgba(234,67,53,${frac * 0.12})`;
      }, { passive: true });

      card.addEventListener('touchend', () => {
        if (!active) return;
        active = false;
        if (isHoriz && Math.abs(curX) > 110) {
          card.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
          card.style.transform = 'translateX(-100%)';
          card.style.opacity = '0';
          setTimeout(() => { _swipeBlocking = false; deleteRec(id); }, 220);
        } else {
          card.style.transition = '';
          card.style.transform = '';
          card.style.background = '';
          setTimeout(() => { _swipeBlocking = false; }, 50);
        }
      }, { passive: true });
    });
  });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── DETAIL MODAL ──
function mapsQuery(r) {
  return [r.name, r.neighborhood, r.city, r.country].filter(Boolean).join(', ');
}
function mapsUrl(r) {
  return `https://www.google.com/maps/search/${encodeURIComponent(mapsQuery(r))}`;
}
function appleMapsUrl(r) {
  return `https://maps.apple.com/?q=${encodeURIComponent(mapsQuery(r))}`;
}

function makeDetailEditable(el, field, r) {
  el.contentEditable = 'true';
  el.style.cursor = 'text';
  el.style.borderBottom = '1px dashed var(--border)';
  el.onblur = async function() {
    const newVal = this.innerText.trim();
    const rec = allRecs.find(x => x.id === r.id);
    if (!rec || !newVal || newVal === (rec[field] || '').trim()) return;
    rec[field] = newVal;
    await api('/api/recommendations/' + r.id, 'PUT', { ...rec });
    // Refresh maps links if location changed
    if (['city','neighborhood','address'].includes(field)) {
      document.getElementById('detail-google-maps-link').href = mapsUrl(rec);
      document.getElementById('detail-apple-maps-link').href = appleMapsUrl(rec);
    }
  };
}

function openDetail(id) {
  const r = allRecs.find(x => x.id === id);
  if (!r) return;
  const myItem = _currentUser && r.user_id === _currentUser.id;

  const srcColor = getRecSourceColor(r);
  document.getElementById('detail-icon').innerHTML = typeIconHtml(r.type, 40, srcColor);

  const nameEl = document.getElementById('detail-name');
  nameEl.textContent = r.name.replace(/^[\p{Emoji}\s]+/u, '').trim() || r.name;
  nameEl.contentEditable = myItem ? 'true' : 'false';
  nameEl.style.cursor = myItem ? 'text' : '';
  nameEl.style.borderBottom = '';
  if (myItem) {
    nameEl.onblur = async function() {
      const newVal = this.innerText.trim();
      const rec = allRecs.find(x => x.id === r.id);
      if (rec && newVal && newVal !== rec.name) { rec.name = newVal; await api('/api/recommendations/'+r.id,'PUT',{...rec}); }
    };
  }

  const metaEl = document.getElementById('detail-meta');
  const metaParts = [r.city, r.neighborhood, r.type ? r.type.charAt(0).toUpperCase()+r.type.slice(1) : ''].filter(Boolean);
  metaEl.textContent = metaParts.join(' · ');
  metaEl.contentEditable = myItem ? 'true' : 'false';
  metaEl.style.cursor = myItem ? 'text' : '';
  metaEl.style.borderBottom = '';
  if (myItem) {
    metaEl.title = 'Edit: City · Neighborhood · Type';
    metaEl.onblur = async function() {
      const parts = this.innerText.split('·').map(s=>s.trim()).filter(Boolean);
      const rec = allRecs.find(x => x.id === r.id);
      if (!rec) return;
      // Update city if first part changed
      if (parts[0] && parts[0] !== rec.city) { rec.city = parts[0]; }
      await api('/api/recommendations/'+r.id,'PUT',{...rec});
      document.getElementById('detail-google-maps-link').href = mapsUrl(rec);
      document.getElementById('detail-apple-maps-link').href = appleMapsUrl(rec);
    };
  }

  // Maps links (top-right)
  document.getElementById('detail-google-maps-link').href = mapsUrl(r);
  document.getElementById('detail-apple-maps-link').href = appleMapsUrl(r);

  // Phone
  const phoneRow = document.getElementById('detail-phone-row');
  if (r.phone) {
    phoneRow.style.display = 'flex';
    const link = document.getElementById('detail-phone-link');
    link.textContent = r.phone;
    link.href = 'tel:' + r.phone.replace(/[^\d+]/g, '');
  } else {
    phoneRow.style.display = 'none';
  }

  // Recommended by (under address)
  const recRow = document.getElementById('detail-recommended-row');
  const recPeople = document.getElementById('detail-recommended-people');
  if (r.recommended_by) {
    recRow.style.display = 'flex';
    const people = r.recommended_by.split(',').map(p => p.trim()).filter(Boolean);
    recPeople.innerHTML = people.map(p => {
      const col = FOLDER_COLORS[getPersonFolder(p)] || FOLDER_COLORS.other;
      return `<span style="font-size:12px;padding:2px 10px;border-radius:20px;background:${col}22;color:${col};border:1px solid ${col}55;font-weight:500">${esc(p)}</span>`;
    }).join('');
  } else {
    recRow.style.display = 'none';
  }

  // Notes
  const notesRow = document.getElementById('detail-notes-row');
  notesRow.style.display = 'flex';
  const notesEl = document.getElementById('detail-notes-text');
  notesEl._recId = r.id;
  notesEl.contentEditable = 'true';

  function renderNotesContent(rec) {
    if (rec.notes) {
      let html = esc(rec.notes);
      if (rec.source_url) html += `<br><a href="${esc(rec.source_url)}" target="_blank" style="color:var(--blue);font-size:12px;margin-top:4px;display:inline-block">View source ↗</a>`;
      notesEl.innerHTML = html;
      notesEl.style.color = '';
      notesEl.style.fontStyle = '';
    } else {
      notesEl.innerHTML = 'No notes yet';
      notesEl.style.color = 'var(--text3)';
      notesEl.style.fontStyle = 'italic';
      if (rec.source_url) {
        notesEl.innerHTML += `<br><a href="${esc(rec.source_url)}" target="_blank" style="color:var(--blue);font-size:12px;margin-top:4px;display:inline-block;font-style:normal">View source ↗</a>`;
      }
    }
  }
  renderNotesContent(r);

  notesEl.onfocus = function() {
    const rec = allRecs.find(x => x.id === this._recId);
    // Clear placeholder text when user taps into notes
    if (!rec?.notes && this.innerText.startsWith('No notes yet')) {
      this.innerHTML = '';
      this.style.color = '';
      this.style.fontStyle = '';
    }
  };
  notesEl.onblur = async function() {
    const newNotes = this.innerText.trim();
    const rec = allRecs.find(x => x.id === this._recId);
    if (!rec) return;
    if (newNotes !== (rec.notes || '').trim()) {
      if (newNotes) {
        await api('/api/recommendations/' + this._recId, 'PUT', { ...rec, notes: newNotes });
        rec.notes = newNotes;
      } else {
        await api('/api/recommendations/' + this._recId, 'PUT', { ...rec, notes: '' });
        rec.notes = '';
      }
    }
    renderNotesContent(rec);
  };

  _detailJustOpened = true; // prevent the opening tap from immediately closing via doc listener
  document.getElementById('detail-overlay').classList.add('open');
}


function closeDetailModal() {
  document.getElementById('detail-overlay').classList.remove('open');
}
// Close detail modal when clicking outside it.
// _detailJustOpened prevents the same tap that opened it from immediately closing it.
let _detailJustOpened = false;
document.addEventListener('click', function(e) {
  if (_detailJustOpened) { _detailJustOpened = false; return; }
  const overlay = document.getElementById('detail-overlay');
  if (!overlay || !overlay.classList.contains('open')) return;
  const modal = overlay.querySelector('.modal');
  if (modal && !modal.contains(e.target)) closeDetailModal();
});

// ── MOBILE NAV + SWIPE ──
function setMode(mode) {
  // Close buddy panel whenever user taps List, Add, or Map nav
  const buddy = document.getElementById('buddy-panel');
  if (buddy && buddy.classList.contains('open')) closeBuddy();
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const sheet = document.getElementById('mobile-sheet');

  if (mode === 'list') {
    document.getElementById('nav-list').classList.add('active');
    sheet.classList.add('open');
    expandSearchFilters();
    if (!map) initMap();
    renderMobileList(); // re-render with current map viewport bounds
    disableMapInteraction();
  } else if (mode === 'map') {
    document.getElementById('nav-map').classList.add('active');
    sheet.classList.remove('open');
    collapseSearchFilters();
    if (!map) initMap();
    enableMapInteraction();
  } else if (mode === 'add') {
    document.getElementById('nav-map').classList.add('active');
    sheet.classList.remove('open');
    openAddDrawer();
  }
}

// Count recs the list would show at the current map bounds — same logic as renderMobileList
function visibleRecCount() {
  if (!map) return 0;
  const b = map.getBounds();
  return filtered.filter(r => r.latitude && r.longitude &&
    b.contains([parseFloat(r.latitude), parseFloat(r.longitude)])).length;
}

// Center on user, zoom out until the list would show 2+ places.
function centerOnUserWithDots(lat, lng) {
  if (!map) return;
  map.setView([lat, lng], 14, { animate: false });
  for (let z = 14; z >= 8; z--) {
    if (visibleRecCount() >= 2) break;
    if (z > 8) map.setZoom(z - 1, { animate: false });
  }
  if (visibleRecCount() < 2) map.setZoom(11, { animate: false });
  map.panTo([lat, lng], { animate: true, duration: 0.4 });
}

function goToCurrentLocation() {
  if (!map) return;
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      _userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      centerOnUserWithDots(pos.coords.latitude, pos.coords.longitude);
    }, () => {
      if (markers.length) recenterMap();
    }, { enableHighAccuracy: true, timeout: 6000 });
  } else if (markers.length) {
    recenterMap();
  }
}

// Swipe-to-dismiss for mobile sheet
function initSheetSwipe() {
  const sheet = document.getElementById('mobile-sheet');
  const handle = document.getElementById('sheet-handle');
  const listBody = document.getElementById('mobile-list-view');
  let startX = 0, startY = 0, isDragging = false;

  function onTouchStart(e) {
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
    // Blur any focused input so cursor doesn't drift with the sheet
    if (document.activeElement && document.activeElement !== document.body) {
      document.activeElement.blur();
    }
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = true;
    sheet.style.transition = 'none';
  }
  function onTouchMove(e) {
    if (!isDragging) return;
    const dx = Math.abs(e.touches[0].clientX - startX);
    const dy = e.touches[0].clientY - startY;
    // Cancel if horizontal movement dominates (card swipe)
    if (dx > Math.abs(dy) && dx > 8) { isDragging = false; sheet.style.transform = ''; return; }
    if (dy > 0) sheet.style.transform = `translateY(${dy}px)`;
  }
  function onTouchEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    sheet.style.transition = '';
    const delta = e.changedTouches[0].clientY - startY;
    sheet.style.transform = '';
    if (delta > 80) setMode('map');
  }

  handle.addEventListener('touchstart', onTouchStart, { passive: true });
  handle.addEventListener('touchmove', onTouchMove, { passive: true });
  handle.addEventListener('touchend', onTouchEnd, { passive: true });

  listBody.addEventListener('touchstart', e => {
    if (listBody.scrollTop <= 0) onTouchStart(e);
  }, { passive: true });
  listBody.addEventListener('touchmove', e => {
    if (isDragging) onTouchMove(e);
  }, { passive: true });
  listBody.addEventListener('touchend', e => {
    if (isDragging) onTouchEnd(e);
  }, { passive: true });
}

// Swipe-to-dismiss for add drawer — full drawer, scroll-aware
function initDrawerSwipe() {
  const drawer = document.getElementById('add-drawer');
  let startY = 0, isDragging = false;

  function onTouchStart(e) {
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA' || tag === 'BUTTON') return;
    if (drawer.scrollTop > 0) return; // only allow swipe when at top
    startY = e.touches[0].clientY;
    isDragging = true;
    drawer.style.transition = 'none';
  }
  function onTouchMove(e) {
    if (!isDragging) return;
    const delta = e.touches[0].clientY - startY;
    if (delta > 0) drawer.style.transform = `translateY(${delta}px)`;
  }
  function onTouchEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    const delta = e.changedTouches[0].clientY - startY;
    if (delta > 80) {
      drawer.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';
      drawer.style.transform = 'translateY(100%)';
      setTimeout(() => {
        drawer.style.transition = '';
        drawer.style.transform = '';
        document.getElementById('add-overlay').classList.remove('open');
      }, 300);
    } else {
      drawer.style.transition = '';
      drawer.style.transform = '';
    }
  }

  drawer.addEventListener('touchstart', onTouchStart, { passive: true });
  drawer.addEventListener('touchmove', onTouchMove, { passive: true });
  drawer.addEventListener('touchend', onTouchEnd, { passive: true });
}

// ── MAP ──
function disableMapInteraction() {
  if (!map) return;
  map.dragging.disable();
  map.touchZoom.disable();
  map.doubleClickZoom.disable();
  map.scrollWheelZoom.disable();
}
function enableMapInteraction() {
  if (!map) return;
  map.dragging.enable();
  map.touchZoom.enable();
  map.doubleClickZoom.enable();
  map.scrollWheelZoom.enable();
}

function initMap() {
  if (map) { renderMapMarkers(); return; }
  map = L.map('map', { zoomControl: false }).setView([43, 12], 5);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>',
    maxZoom: 19, subdomains: 'abcd'
  }).addTo(map);
  // Hide Leaflet attribution (covered by nav bar)
  const attr = document.querySelector('.leaflet-control-attribution');
  if (attr) attr.style.display = 'none';

  renderMapMarkers();
  // Show all dots immediately so the map isn't blank while waiting for geolocation
  if (markers.length) recenterMap();

  // Then try to get user location and re-center to show 2 nearest dots
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      _userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      if (locationDot) map.removeLayer(locationDot);
      locationDot = L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
        radius: 9, fillColor: '#4285F4', color: 'white',
        weight: 3, fillOpacity: 1, zIndexOffset: 1000
      }).addTo(map);
      centerOnUserWithDots(pos.coords.latitude, pos.coords.longitude);
    }, () => {
      // No location available — already showing all markers, nothing to do
    }, { enableHighAccuracy: false, timeout: 8000 });
  }

  // Inject recenter into Leaflet zoom control (mobile only)
  if (!isDesktop()) {
    setTimeout(() => {
      const zoomBar = document.querySelector('.leaflet-control-zoom');
      if (zoomBar && !zoomBar.querySelector('.leaflet-recenter-btn')) {
        const btn = document.createElement('a');
        btn.href = '#';
        btn.className = 'leaflet-control-zoom-out leaflet-recenter-btn';
        btn.title = 'Recenter';
        btn.setAttribute('role', 'button');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/></svg>`;
        btn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); recenterBtnClick(); };
        zoomBar.appendChild(btn);
      }
    }, 300);
  }
  // Re-render mobile list + update glow when map moves
  map.on('moveend', () => {
    updateSearchGlow();
    if (!isDesktop()) {
      const sheet = document.getElementById('mobile-sheet');
      if (sheet && sheet.classList.contains('open')) renderMobileList();
    }
  });
  map.on('click', () => {
    if (!isDesktop()) {
      const sheet = document.getElementById('mobile-sheet');
      if (sheet && sheet.classList.contains('open')) closeSheetOnly();
      const buddy = document.getElementById('buddy-panel');
      if (buddy && buddy.classList.contains('open')) closeBuddy();
    }
  });
}

function recenterMap() {
  if (!map) return;
  if (markers.length) {
    map.fitBounds(L.featureGroup(markers).getBounds().pad(0.3), { maxZoom: 14 });
  } else {
    map.setView([42.5, 12.5], 6);
  }
}

function updateSearchGlow() {
  const bar = document.getElementById('map-search-bar');
  if (!bar) return;
  const bounds = map ? map.getBounds() : null;
  const colorCount = {};
  filtered.forEach(r => {
    let lat = r.latitude ? parseFloat(r.latitude) : null;
    let lng = r.longitude ? parseFloat(r.longitude) : null;
    if (!lat || !lng) {
      const cc = _cityCoords[(r.city || '').toLowerCase().trim()];
      if (cc) { lat = cc.latitude; lng = cc.longitude; }
    }
    if (!lat || !lng) return;
    // When map is live, only count dots actually in the viewport
    if (bounds && !bounds.contains([lat, lng])) return;
    colorCount[getRecSourceColor(r)] = (colorCount[getRecSourceColor(r)] || 0) + 1;
  });
  const topColor = Object.keys(colorCount).sort((a, b) => colorCount[b] - colorCount[a])[0]
    || '#1a73e8';
  bar.style.boxShadow = `0 2px 14px ${topColor}55, 0 1px 5px ${topColor}33`;
}

function renderMapMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  filtered.forEach(r => {
    // Use precise coords if available, otherwise fall back to city-level
    let lat = r.latitude ? parseFloat(r.latitude) : null;
    let lng = r.longitude ? parseFloat(r.longitude) : null;
    if (!lat || !lng) {
      const cityKey = (r.city || '').toLowerCase().trim();
      const cc = _cityCoords[cityKey];
      if (cc) { lat = cc.latitude; lng = cc.longitude; }
    }
    if (!lat || !lng) return; // no coords at all, skip
    const srcColor = getRecSourceColor(r);
    const icon = L.divIcon({
      className: '',
      html: typeIconHtml(r.type, 32, srcColor),
      iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -16]
    });
    const m = L.marker([lat, lng], { icon }).addTo(map);
    m.on('click', () => openDetail(r.id));
    markers.push(m);
  });
  updateSearchGlow();
}

function renderAddChips() {
  const container = document.getElementById('add-person-chips');

  if (_addCustomPerson && !people.some(p => p.toLowerCase() === _addCustomPerson.toLowerCase())) {

  }
  container.innerHTML = people.map(p => {

    const style = sel
      ? `background:${col};color:#fff;border-color:${col}`

    return `<button class="add-chip" style="${style}" onclick="selectAddPerson('${p.replace(/'/g,"\\'")}')">

function showAddNewChip() {

function openAddDrawer() {
  document.getElementById('raw-input').value = '';

  _addCustomPerson = null;
  renderAddChips();
  // Default city to wherever the map is currently centered (reverse geocode)
  const cityInp = document.getElementById('input-city');
  cityInp.value = '';
  if (map) {
    const c = map.getCenter();
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${c.lat}&lon=${c.lng}&format=json&zoom=10`, {
      headers: { 'User-Agent': 'HoneymoonApp/1.0 rob@robresnick.com' }
    }).then(r => r.json()).then(d => {
      const a = d.address || {};

    }).catch(() => {});

async function parseInput() {
  const input = document.getElementById('raw-input').value.trim();
  if (!input) return showToast('Paste something first');
  const city = document.getElementById('input-city').value.trim();
  const recommended_by = _addSelectedPerson || 'Me';
  const btn = document.getElementById('parse-btn');
  btn.innerHTML = '<span class="spinner"></span> Parsing…';
  btn.disabled = true;
  const data = await api('/api/parse', 'POST', { input });
  btn.textContent = 'Add';
  btn.disabled = false;
  if (!data || !data.recommendations) return showToast('Could not parse — try again');

  // Auto-save if exactly 1 result (no confirmation step)
  if (data.recommendations.length === 1) {
    btn.innerHTML = '<span class="spinner"></span> Saving…';
    btn.disabled = true;
    const rec = { ...data.recommendations[0], city: city || data.recommendations[0].city, recommended_by, raw_input: input };
    const saved = await api('/api/recommendations', 'POST', [rec]);
    btn.innerHTML = 'Add'; btn.disabled = false;
    closeAddDrawer();
    showToast(`Added ${saved?.[0]?.name || 'place'}!`);
    await loadRecs(); await loadFilters();
    return;
  }
  renderParseResults(data.recommendations, input);
}

function renderParseResults(recs, rawInput) {
  const el = document.getElementById('parse-results');
  if (!recs.length) { el.innerHTML = '<p style="color:var(--text2);font-size:13px">No recommendations found.</p>'; return; }
  const types = ['restaurant','bar','cafe','museum','attraction','hotel','shop','market','beach','church','neighborhood','other'];
  const isSingle = recs.length === 1;
  pendingParseCount = recs.length;
  pendingRawInput = rawInput;
  // Hide the parse area while showing results
  document.querySelector('.parse-area').style.display = 'none';
  el.innerHTML = recs.map((r, i) => `
    <div class="parse-result-item" id="result-${i}" data-neighborhood="${esc(r.neighborhood||'')}">
      <div class="item-name" data-name="${esc(r.name)}">${esc(r.name)}</div>
      ${(r.neighborhood || r.city) ? `<div style="font-size:12px;color:var(--text2);margin:-4px 0 8px">📍 ${[r.neighborhood, r.city].filter(Boolean).map(s=>esc(s)).join(', ')}</div>` : ''}
      <div class="field">
        <label>Type</label>
        <select id="r-type-${i}">${types.map(t=>`<option value="${t}"${r.type===t?' selected':''}>${t.charAt(0).toUpperCase()+t.slice(1)}</option>`).join('')}</select>
      </div>
      ${isSingle ? `<div class="field"><label>Notes</label><textarea id="r-notes-${i}" style="min-height:60px;resize:vertical">${esc(r.notes||'')}</textarea></div>` : ''}
    </div>
  `).join('') + `
    <div style="display:flex;gap:8px;margin-top:8px;padding-bottom:8px">
      <button class="btn btn-ghost" onclick="showParseArea()">← Back</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveParseResults()">Save ${recs.length} place${recs.length>1?'s':''}</button>
    </div>`;
}

function showParseArea() {
  document.querySelector('.parse-area').style.display = '';
  document.getElementById('parse-results').innerHTML = '';
}

async function saveParseResults() {
  const count = pendingParseCount, rawInput = pendingRawInput;
  const city = document.getElementById('input-city').value.trim();
  const recommended_by = _addSelectedPerson || 'Me';
  const isSingle = count === 1;
  const recs = [];
  for (let i = 0; i < count; i++) {
    const nameDiv = document.querySelector(`#result-${i} .item-name`);
    const resultEl = document.getElementById(`result-${i}`);
    recs.push({
      name: nameDiv ? nameDiv.dataset.name : '',
      type: document.getElementById(`r-type-${i}`)?.value,
      city, recommended_by,
      neighborhood: resultEl?.dataset.neighborhood || '',
      notes: isSingle ? (document.getElementById(`r-notes-${i}`)?.value || '') : '',
      raw_input: rawInput,
    });
  }
  const btn = document.querySelector('#parse-results .btn-primary');
  if (btn) { btn.innerHTML = '<span class="spinner"></span> Saving…'; btn.disabled = true; }
  const saved = await api('/api/recommendations', 'POST', recs);
  closeAddDrawer();
  showToast(`Saved ${saved?.length || count} place${count>1?'s':''}!`);
  await loadRecs(); await loadFilters();
  // Refresh city coords so any new city shows up on map immediately
  api('/api/city-coords').then(data => { if (data) { _cityCoords = data; if (map) renderMapMarkers(); } });
}

// ── FIX NO-LOCATION ROUTINE ──
let _fixingLocations = false;

// silent=true: background auto-run (no button state, toast only on success)
// silent=false: manual retry — resets geocode_attempted so ⚠️ places get another shot
async function runFixNoLocation(silent = false) {
  if (_fixingLocations) return;
  _fixingLocations = true;
  const btn = document.getElementById('fix-location-btn');
  if (!silent && btn) { btn.textContent = '⏳ Retrying…'; btn.disabled = true; }

  let fixed = 0;
  let attempts = 0;
  const maxAttempts = 50; // safety cap
  // On manual retry, reset geocode_attempted for ⚠️ places on first call
  let firstCall = !silent;

  while (attempts++ < maxAttempts) {
    try {
      const url = firstCall ? '/api/fix-no-location?retry=1' : '/api/fix-no-location';
      firstCall = false;
      const result = await api(url, { method: 'POST' });
      if (!result || result.done) break;
      if (result.updated) {
        fixed++;
        showToast(`📍 Fixed location: ${result.name}`, 2000);
      }
      if (result.remaining === 0) break;
      await new Promise(r => setTimeout(r, 400));
    } catch (e) {
      console.error('fix-no-location error:', e);
      break;
    }
  }

  _fixingLocations = false;
  // Reload to reflect any changes (suppress auto-fix re-trigger)
  _suppressAutoFix = true;
  await loadRecs();
  _suppressAutoFix = false;
  if (!silent && btn) { btn.disabled = false; }
  if (!silent) showToast(fixed > 0 ? `✅ Fixed ${fixed} location${fixed !== 1 ? 's' : ''}` : '✅ Done checking', 2500);
}

// Auto-triggered after save/load when ⏳ (pending) places exist
let _suppressAutoFix = false;
function autoFixIfNeeded() {
  if (_suppressAutoFix || _fixingLocations) return;
  if (_pendingCoords.size > 0) {
    runFixNoLocation(true); // silent background run
  }
}

(function() {

  const blob = new Blob([svgSrc], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = 180;

}
function buddyDrop(e, targetFolder) {
  e.preventDefault(); e.stopPropagation();
  const name = _draggingPerson || e.dataTransfer.getData('text/plain');
  if (!name) return;
  for (const fid of Object.keys(_buddyFolders)) {
    _buddyFolders[fid] = (_buddyFolders[fid] || []).filter(p => p !== name);
  }
  if (!_buddyFolders[targetFolder]) _buddyFolders[targetFolder] = [];
  _buddyFolders[targetFolder].push(name);
  localStorage.setItem('hm_buddy_folders', JSON.stringify(_buddyFolders));
  // Clear unassigned color so the person takes on folder color
  delete _personColors[name];
  localStorage.setItem('hm_person_colors', JSON.stringify(_personColors));
  _draggingPerson = null;
  saveBuddySettings();
  renderBuddyNames(); applyFilters();
}

function buddyDropOnPerson(e, targetFolder, beforePerson) {
  e.preventDefault(); e.stopPropagation();
  const name = _draggingPerson || e.dataTransfer.getData('text/plain');
  if (!name || name === beforePerson) return;
  for (const fid of Object.keys(_buddyFolders)) {
    _buddyFolders[fid] = (_buddyFolders[fid] || []).filter(p => p !== name);
  }
  if (!_buddyFolders[targetFolder]) _buddyFolders[targetFolder] = [];
  const idx = _buddyFolders[targetFolder].indexOf(beforePerson);
  if (idx >= 0) _buddyFolders[targetFolder].splice(idx, 0, name);
  else _buddyFolders[targetFolder].push(name);
  localStorage.setItem('hm_buddy_folders', JSON.stringify(_buddyFolders));
  // Clear unassigned color so the person takes on folder color
  delete _personColors[name];
  localStorage.setItem('hm_person_colors', JSON.stringify(_personColors));
  _draggingPerson = null;
  saveBuddySettings();
  renderBuddyNames(); applyFilters();
}

function toggleFolder(fid) {
  _folderStates[fid] = (_folderStates[fid] === false) ? true : false;
  localStorage.setItem('hm_folder_states', JSON.stringify(_folderStates));
  saveBuddySettings();
  renderBuddyNames();
  applyFilters();
}

function toggleFolderExpand(fid) {
  _folderExpanded[fid] = (_folderExpanded[fid] === false) ? true : false;
  localStorage.setItem('hm_folder_expanded', JSON.stringify(_folderExpanded));
  saveBuddySettings();
  renderBuddyNames();
}


// ── PEOPLE PICKER ──
function renderPeoplePicker(pickerId, selectedSet) {
  const el = document.getElementById(pickerId);
  if (!el) return;
  el.innerHTML = allPeople.map(p => {
    const sel = selectedSet.has(p);
    return `<button type="button" class="people-pill${sel ? ' selected' : ''}"
      onclick="togglePersonPill('${p.replace(/'/g,"\\'")}','${pickerId}')">${esc(p)}</button>`;
  }).join('');
}

function togglePersonPill(name, pickerId) {
  const set = pickerId.startsWith('add') ? _addSelectedPeople : _editSelectedPeople;
  const hiddenId = pickerId.startsWith('add') ? 'input-person' : 'edit-recommended-by';
  if (set.has(name)) set.delete(name); else set.add(name);
  renderPeoplePicker(pickerId, set);
  document.getElementById(hiddenId).value = [...set].join(', ');
}

async function handleNewPersonKey(e, context) {
  if (e.key !== 'Enter' && e.key !== ',') return;
  e.preventDefault();
  const name = e.target.value.trim().replace(/,$/, '');
  if (!name) return;
  e.target.value = '';
  if (!allPeople.includes(name)) {
    allPeople = [...new Set([...allPeople, name])].sort((a, b) => a.localeCompare(b));
    await api('/api/people', 'POST', { people: allPeople });
  }
  const pickerId = context === 'add' ? 'add-person-picker' : 'edit-person-picker';
  const set = context === 'add' ? _addSelectedPeople : _editSelectedPeople;
  const hiddenId = context === 'add' ? 'input-person' : 'edit-recommended-by';
  set.add(name);
  renderPeoplePicker(pickerId, set);
  document.getElementById(hiddenId).value = [...set].join(', ');
}

function initAddPersonPicker() {
  _addSelectedPeople.clear();
  renderPeoplePicker('add-person-picker', _addSelectedPeople);
  const inp = document.getElementById('input-person');
  if (inp) inp.value = '';
  const newInp = document.getElementById('add-person-new');
  if (newInp) newInp.value = '';
}

function initEditPersonPicker(currentValue) {
  _editSelectedPeople = new Set((currentValue || '').split(',').map(p => p.trim()).filter(Boolean));
  renderPeoplePicker('edit-person-picker', _editSelectedPeople);
  const newInp = document.getElementById('edit-person-new');
  if (newInp) newInp.value = '';
}

function toggleBuddy() {
  const panel = document.getElementById('buddy-panel');
  if (panel.classList.contains('open')) closeBuddy();
  else openBuddy();
}

function openBuddy() {
  document.getElementById('buddy-panel').classList.add('open');
  document.getElementById('buddy-settings-popup').classList.remove('visible');
  // Gray out search shadow while buddy open
  const bar = document.getElementById('map-search-bar');
  if (bar) bar.style.boxShadow = '0 2px 10px rgba(0,0,0,0.15)';
  // Always keep map movable while buddy is open
  enableMapInteraction();
  renderBuddyNames();

  // Refresh from server in background, re-render if new data
  api('/api/people').then(fresh => {
    if (Array.isArray(fresh) && fresh.length) {
      allPeople = fresh;
      renderBuddyNames();
    }
  }).catch(() => {});
}

function getFolderColor(fid) {
  if (FOLDER_COLORS[fid]) return FOLDER_COLORS[fid];
  // Custom folder: pick from PERSON_PALETTE
  const customIdx = _folderOrder.indexOf(fid) - 3; // offset past built-ins
  return PERSON_PALETTE[((customIdx % PERSON_PALETTE.length) + PERSON_PALETTE.length) % PERSON_PALETTE.length];
}

let _folderLongPressTimer = null;
let _folderLongPressActive = false;

function folderPressStart(e, fid) {
  _folderLongPressActive = false;
  _folderLongPressTimer = setTimeout(() => {
    _folderLongPressActive = true;
    startFolderRename(fid);
  }, 500);
}
function folderPressEnd(e, fid) {
  clearTimeout(_folderLongPressTimer);
}
function folderPressClick(e, fid) {
  if (_folderLongPressActive) { e.stopPropagation(); return; }
  toggleFolderExpand(fid);
}

function startFolderRename(fid) {
  const label = _folderLabels[fid] || fid;
  const color = getFolderColor(fid);
  // Show a floating popup so the keyboard opens properly on mobile
  const existing = document.getElementById('folder-rename-popup');
  if (existing) existing.remove();
  const popup = document.createElement('div');
  popup.id = 'folder-rename-popup';
  popup.style.cssText = `position:fixed;inset:0;z-index:5000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6)`;
  popup.innerHTML = `
    <div style="background:#1a1a1a;border-radius:10px;padding:20px;width:260px;box-shadow:0 8px 32px rgba(0,0,0,0.5);position:relative">
      <button onclick="confirmDeleteFolder('${fid}')"
        style="position:absolute;top:10px;right:10px;background:none;border:none;color:#888;font-size:10px;cursor:pointer;padding:4px 8px;letter-spacing:.03em">Delete</button>
      <input id="folder-rename-input" value="${esc(label)}"
        style="width:100%;background:#111;border:1px solid #333;border-radius:6px;color:#fff;font-size:15px;padding:8px 10px;outline:none;box-sizing:border-box;margin-top:4px"
        onkeydown="if(event.key==='Enter'){saveFolderLabel('${fid}',this.value);}" />
      <div style="display:flex;gap:8px;margin-top:12px">
        <button onclick="document.getElementById('folder-rename-popup').remove();renderBuddyNames();"
          style="flex:1;background:#333;border:none;color:#aaa;border-radius:6px;padding:8px;cursor:pointer;font-size:13px">Cancel</button>
        <button onclick="saveFolderLabel('${fid}',document.getElementById('folder-rename-input').value)"
          style="flex:1;background:${color};border:none;color:#fff;border-radius:6px;padding:8px;cursor:pointer;font-size:13px;font-weight:600">Save</button>
      </div>
    </div>`;
  document.body.appendChild(popup);
  const inp = document.getElementById('folder-rename-input');
  inp.focus(); inp.select();
}

function saveFolderLabel(fid, val) {
  const label = val.trim() || _folderLabels[fid] || fid;
  _folderLabels[fid] = label;
  localStorage.setItem('hm_folder_labels', JSON.stringify(_folderLabels));
  saveBuddySettings();
  const popup = document.getElementById('folder-rename-popup');
  if (popup) popup.remove();
  renderBuddyNames();
}

function confirmDeleteFolder(fid) {
  const label = _folderLabels[fid] || fid;
  if (!confirm(`Delete "${label}"? Members will move to Unassigned.`)) return;
  deleteFolder(fid);
}

function deleteFolder(fid) {
  delete _buddyFolders[fid];
  _folderOrder = _folderOrder.filter(f => f !== fid);
  delete _folderLabels[fid];
  delete _folderStates[fid];
  delete _folderExpanded[fid];
  localStorage.setItem('hm_buddy_folders', JSON.stringify(_buddyFolders));
  localStorage.setItem('hm_folder_order', JSON.stringify(_folderOrder));
  localStorage.setItem('hm_folder_labels', JSON.stringify(_folderLabels));
  localStorage.setItem('hm_folder_states', JSON.stringify(_folderStates));
  localStorage.setItem('hm_folder_expanded', JSON.stringify(_folderExpanded));
  saveBuddySettings();
  renderBuddyNames();
  applyFilters();
}

function addFolder() {
  const fid = 'folder_' + Date.now();
  _buddyFolders[fid] = [];
  _folderOrder.push(fid);
  _folderLabels[fid] = 'New List';
  _folderStates[fid] = true;
  _folderExpanded[fid] = true;
  localStorage.setItem('hm_buddy_folders', JSON.stringify(_buddyFolders));
  localStorage.setItem('hm_folder_order', JSON.stringify(_folderOrder));
  localStorage.setItem('hm_folder_labels', JSON.stringify(_folderLabels));
  localStorage.setItem('hm_folder_states', JSON.stringify(_folderStates));
  localStorage.setItem('hm_folder_expanded', JSON.stringify(_folderExpanded));
  saveBuddySettings();
  renderBuddyNames();
  // Auto-start rename for the new folder
  setTimeout(() => startFolderRename(fid), 50);
}

function renderBuddyNames() {
  // Fall back to deriving from allRecs if allPeople still empty
  if (!allPeople.length) {
    allPeople = [...new Set(
      allRecs.flatMap(r => r.recommended_by ? r.recommended_by.split(',').map(p => p.trim()).filter(Boolean) : [])
    )].sort((a, b) => a.localeCompare(b));
    if (allPeople.length) api('/api/people', 'POST', { people: allPeople }).catch(() => {});
  }
  const namesEl = document.getElementById('buddy-names');
  if (!namesEl) return;

  function countRecs(p) {
    return allRecs.filter(r => r.recommended_by && r.recommended_by.split(',').map(x=>x.trim()).includes(p)).length;
  }
  function dot(color, muted) {
    return `<div style="width:8px;height:8px;border-radius:50%;background:${muted?'#444':color};flex-shrink:0"></div>`;
  }
  function personRow(p, color, fid) {
    const muted = _hiddenPeople.has(p);
    const escapedP = p.replace(/'/g,"\\'");
    return `<div class="buddy-item${muted?' muted':''}" draggable="true"
      ondragstart="buddyDragStart(event,'${escapedP}')"
      ondragover="event.preventDefault()"
      ondrop="buddyDropOnPerson(event,'${fid||''}','${escapedP}')"
      onclick="toggleBuddyPerson('${escapedP}')">
      ${dot(color, muted)}
      <span class="buddy-name">${esc(p)}</span>
    </div>`;
  }

  // ── "Me" row (always at top, always blue) ──
  const displayPeople = allPeople.filter(p => !isMe(p));
  let html = '';
  if (_currentUser) {
    const meMuted = _hiddenPeople.has('__me__');
    const meCount = allRecs.filter(r => {
      if (!r.recommended_by) return false;
      return r.recommended_by.split(',').map(p => p.trim()).some(p => isMe(p));
    }).length;
    html = `<div class="buddy-me-row${meMuted?' muted':''}" onclick="toggleBuddyPerson('__me__')">
      ${dot(FOLDER_COLORS.me, meMuted)}
      <span class="buddy-name">Me</span>
      <span style="margin-left:auto;font-size:10px;color:${meMuted?'#444':'#666'}">${meCount}</span>
    </div>`;
  }

  // ── Folders (use _folderOrder) ──
  const assignedPeople = new Set(
    _folderOrder.flatMap(fid => (_buddyFolders[fid] || []).filter(p => !isMe(p)))
  );

  for (const fid of _folderOrder) {
    const label = _folderLabels[fid] || fid;
    const color = getFolderColor(fid);
    const members = (_buddyFolders[fid] || []).filter(p => displayPeople.includes(p));
    const folderOn = _folderStates[fid] !== false;
    const expanded = _folderExpanded[fid] !== false;
    html += `<div class="buddy-folder-header" data-fid="${fid}"
      ondragover="event.preventDefault()"
      ondrop="buddyDrop(event,'${fid}')"
      onmousedown="folderPressStart(event,'${fid}')"
      ontouchstart="folderPressStart(event,'${fid}')"
      onmouseup="folderPressEnd(event,'${fid}')"
      ontouchend="folderPressEnd(event,'${fid}')"
      onclick="folderPressClick(event,'${fid}')">
      ${dot(color, !folderOn)}
      <span style="flex:1;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:${folderOn?'#aaa':'#555'}">${esc(label)}</span>
      <button onclick="event.stopPropagation();toggleFolder('${fid}')"
        style="background:none;border:none;color:${folderOn?color:'#555'};padding:0 4px;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:.04em">
        ${folderOn?'ON':'OFF'}
      </button>
      <span style="color:#555;font-size:10px;margin-left:2px">${expanded?'▾':'▸'}</span>
    </div>`;
    if (expanded) {
      for (const p of members) html += personRow(p, color, fid);
      if (!members.length) {
        html += `<div style="padding:6px 14px 6px 28px;font-size:11px;color:#444;font-style:italic"
          ondragover="event.preventDefault()" ondrop="buddyDrop(event,'${fid}')">drop here</div>`;
      }
    }
  }

  // ── Unassigned (excluding current user) ──
  const unassigned = displayPeople.filter(p => !assignedPeople.has(p));
  if (unassigned.length) {
    html += `<div style="padding:8px 14px 2px;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.06em;border-top:1px solid #1a1a1a">Unassigned</div>`;
    for (const p of unassigned) html += personRow(p, getPersonColor(p), '');
  } else if (!displayPeople.length && !_currentUser) {
    html += '<div style="padding:16px 14px;font-size:12px;color:#555">No people yet.</div>';
  }

  html += `<div style="padding:8px 14px;border-top:1px solid #1a1a1a">
    <button onclick="addFolder()" style="background:none;border:none;color:#555;font-size:11px;cursor:pointer;padding:4px 0;letter-spacing:.04em">+ add list</button>
  </div>`;

  namesEl.innerHTML = html;
}

function closeBuddy() {
  document.getElementById('buddy-panel').classList.remove('open');
  document.getElementById('buddy-settings-popup').classList.remove('visible');
  // Restore dynamic search glow
  updateSearchGlow();
  // Re-disable map if the list sheet is still open
  const sheet = document.getElementById('mobile-sheet');
  if (sheet && sheet.classList.contains('open')) disableMapInteraction();
}

function toggleBuddyPerson(name) {
  if (_hiddenPeople.has(name)) _hiddenPeople.delete(name);
  else _hiddenPeople.add(name);
  localStorage.setItem('hm_hidden_people', JSON.stringify([..._hiddenPeople]));
  saveBuddySettings();
  renderBuddyNames();
  applyFilters();
}

function toggleBuddySettings() {
  document.getElementById('buddy-settings-popup').classList.toggle('visible');
}

function resetBuddyList() {
  _hiddenPeople.clear();
  localStorage.removeItem('hm_hidden_people');
  _folderStates = { friends: true, internet: true, other: true };
  localStorage.setItem('hm_folder_states', JSON.stringify(_folderStates));
  saveBuddySettings();
  closeBuddy();
  applyFilters();
}

(function initBuddySwipe() {
  let startX = 0, dragging = false;
  const panel = document.getElementById('buddy-panel');
  if (!panel) return;
  panel.addEventListener('touchstart', e => { startX = e.touches[0].clientX; dragging = true; }, { passive: true });
  panel.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dx = e.touches[0].clientX - startX;
    if (dx < -30) { closeBuddy(); dragging = false; }
  }, { passive: true });
  panel.addEventListener('touchend', () => { dragging = false; }, { passive: true });
})();

// ── DESKTOP: keep filters open when interacting with selects ──
function setupDesktopFilters() {
  const bar = document.getElementById('filter-bar');
  if (!bar) return;
  const inp = document.getElementById('search-input');
  const countEl = document.getElementById('rec-count');

  // Keep filters-open while anything in the bar is focused/changed
  bar.addEventListener('focusin', () => bar.classList.add('filters-open'));
  bar.addEventListener('change', () => bar.classList.add('filters-open'));
  bar.addEventListener('focusout', e => {
    if (!bar.contains(e.relatedTarget)) {
      setTimeout(() => { if (!bar.contains(document.activeElement)) bar.classList.remove('filters-open'); }, 200);
    }
  });

  // Show count + list only when search has content or a filter is active
  function updateDesktopList() {
    const hasSearch = inp && inp.value.trim();
    const hasFilter = ['filter-city','filter-type','filter-person'].some(id => {
      const el = document.getElementById(id); return el && el.value;
    });
    const active = hasSearch || hasFilter;
    if (countEl) countEl.style.display = active ? 'inline-block' : 'none';
    const lv = document.getElementById('list-view');
    if (lv) lv.style.visibility = active ? 'visible' : 'hidden';
  }

  if (inp) inp.addEventListener('input', updateDesktopList);
  ['filter-city','filter-type','filter-person'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('change', updateDesktopList);
  });
  updateDesktopList(); // initial state
}

// ── INIT ──
if (isDesktop()) {
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('map-view').style.display = 'block';
  setTimeout(() => { initMap(); setupDesktopFilters(); }, 100);
} else {
  setTimeout(() => { initMap(); initSheetSwipe(); initDrawerSwipe(); }, 100);
  document.getElementById('nav-map').classList.add('active');
  // Hide suggestions when tapping outside search bar
  document.addEventListener('touchstart', e => {
    const bar = document.getElementById('map-search-bar');
    const sugg = document.getElementById('search-suggestions');
    if (bar && !bar.contains(e.target) && sugg && !sugg.contains(e.target)) hideSuggestions();
  }, { passive: true });
}
checkSession();
</script>
