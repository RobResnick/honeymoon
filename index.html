<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Honeymoon</title>
  <meta name="theme-color" content="#ffffff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1A73E8;
      --blue-light: #e8f0fe;
      --blue-dark: #1557b0;
      --red: #EA4335;
      --red-light: #fce8e6;
      --green: #34A853;
      --green-light: #e6f4ea;
      --yellow: #FBBC05;
      --yellow-light: #fef7e0;
      --purple: #9334E6;
      --purple-light: #f3e8fd;
      --text: #202124;
      --text2: #5f6368;
      --text3: #9aa0a6;
      --border: #dadce0;
      --bg: #f8f9fa;
      --card: #ffffff;
      --shadow: 0 1px 3px rgba(60,64,67,.15), 0 1px 2px rgba(60,64,67,.1);
      --shadow-md: 0 2px 6px rgba(60,64,67,.2), 0 1px 2px rgba(60,64,67,.12);
    }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── AUTH ── */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
    }
    .auth-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px 48px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
    }
    .auth-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }
    .auth-logo img { width: 56px; height: 56px; }
    .auth-box h1 {
      font-family: 'Google Sans', sans-serif;
      font-size: 24px;
      font-weight: 400;
      text-align: center;
      color: var(--text);
      margin-bottom: 6px;
    }
    .auth-box p.subtitle {
      color: var(--text2);
      font-size: 14px;
      margin-bottom: 28px;
      text-align: center;
    }
    .auth-toggle {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text2);
    }
    .auth-toggle a { color: var(--blue); cursor: pointer; text-decoration: none; }

    /* ── FORMS ── */
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    input[type=text], input[type=email], input[type=password], select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 14px;
      background: var(--card);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: 'Roboto', Arial, sans-serif;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(26,115,232,0.15);
    }
    .field { margin-bottom: 16px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: box-shadow 0.15s, background 0.15s, opacity 0.15s;
      font-family: 'Google Sans', sans-serif;
      letter-spacing: 0.01em;
    }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { box-shadow: 0 1px 3px rgba(26,115,232,0.4); opacity: 0.92; }
    .btn-secondary { background: var(--bg); color: var(--blue); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--blue-light); }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-danger { background: var(--red-light); color: var(--red); border: 1px solid #f5c6c2; }
    .btn-danger:hover { background: #fad2cf; }
    .btn-full { width: 100%; }
    .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 4px; }

    /* ── APP SHELL ── */
    #app { display: none; flex-direction: column; height: 100vh; }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 56px;
      flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(60,64,67,.1);
    }
    .header-logo { width: 28px; height: 28px; flex-shrink: 0; }
    header h1 {
      font-family: 'Google Sans', sans-serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      flex: 1;
    }
    .header-count {
      font-size: 12px;
      color: var(--text3);
      background: var(--bg);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      display: none;
    }

    .main-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* ── FILTER BAR ── */
    .filter-bar {
      padding: 8px 12px 6px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      z-index: 100;
    }
    .filter-bar input[type=text] {
      width: 100%;
      padding: 9px 16px;
      font-size: 16px;
      border-radius: 24px;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .filter-row {
      display: flex;
      gap: 5px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.2s ease, opacity 0.15s ease, margin 0.2s ease;
      margin-top: 0;
    }
    .filter-bar.filters-open .filter-row,
    .mobile-filter-bar.filters-open .filter-row {
      max-height: 40px;
      opacity: 1;
      margin-top: 2px;
    }
    .filter-row select {
      flex: 1;
      padding: 5px 4px;
      font-size: 11px;
      border-radius: 20px;
      background: var(--bg);
      min-width: 0;
    }

    /* ── LIST VIEW ── */
    #list-view { flex: 1; overflow-y: auto; padding: 12px 16px; }

    /* ── CARDS ── */
    .rec-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: box-shadow 0.15s;
      box-shadow: var(--shadow);
      position: relative;
    }
    .rec-card:hover { box-shadow: var(--shadow-md); }
    .rec-card-top { display: flex; align-items: center; gap: 10px; }
    .rec-type-icon { font-size: 20px; flex-shrink: 0; line-height: 1; }
    .rec-card-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .rec-name-line { display: flex; align-items: baseline; gap: 6px; min-width: 0; }
    .rec-name {
      font-size: 13px;
      font-weight: 500;
      font-family: 'Google Sans', sans-serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .rec-city-text {
      font-size: 12px;
      color: var(--text2);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .rec-tags { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
      border: 1px solid;
      white-space: nowrap;
    }
    /* Person tags → blue (primary color, seen most) */
    .tag.person { background: var(--blue-light); color: var(--blue-dark); border-color: #b8cef8; }
    .tag.city { background: var(--blue-light); color: var(--blue-dark); border-color: #b8cef8; }
    .tag.type { background: var(--purple-light); color: var(--purple); border-color: #dbb8f8; }

    .rec-notes {
      font-size: 13px;
      color: var(--text2);
      margin-top: 10px;
      line-height: 1.5;
      display: none;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .rec-card.expanded .rec-notes { display: block; }
    .rec-actions { display: none; gap: 8px; margin-top: 10px; }
    .rec-card.expanded .rec-actions { display: flex; }

    .rec-delete-btn {
      position: absolute;
      top: 8px; right: 10px;
      border: none;
      background: none;
      color: var(--text3);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      z-index: 2;
      padding: 2px 4px;
    }
    .rec-card:hover .rec-delete-btn { opacity: 1; }
    .rec-delete-btn:hover { color: var(--red); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── MAP ── */
    #map-view { flex: 1; display: none; position: relative; }
    #map { height: 100%; width: 100%; }

    .leaflet-popup-content-wrapper {
      border-radius: 8px !important;
      box-shadow: var(--shadow-md) !important;
      border: 1px solid var(--border);
      font-family: 'Roboto', Arial, sans-serif;
    }
    .leaflet-popup-content { font-size: 13px; margin: 12px 16px !important; }
    .leaflet-popup-content strong {
      font-family: 'Google Sans', sans-serif;
      font-size: 14px;
      display: block;
      margin-bottom: 4px;
      color: var(--text);
    }
    .leaflet-popup-content em { color: var(--text2); font-style: normal; }
    .leaflet-popup-content small { color: var(--text2); }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-control-attribution { font-size: 10px !important; }

    /* ── RECENTER BUTTON ── */
    .recenter-btn {
      position: absolute;
      bottom: 90px;
      right: 10px;
      z-index: 400;
      width: 40px;
      height: 40px;
      border-radius: 4px;
      background: white;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      transition: box-shadow 0.15s, color 0.15s;
    }
    .recenter-btn:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.3); color: var(--blue); }

    /* ── ADD BUTTON ── */
    .add-btn {
      position: absolute;
      bottom: 20px;
      right: 16px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--blue);
      color: white;
      font-size: 26px;
      font-weight: 300;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(60,64,67,0.35), 0 4px 12px rgba(60,64,67,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: box-shadow 0.15s, transform 0.15s;
      line-height: 1;
    }
    .add-btn:hover { box-shadow: 0 4px 12px rgba(60,64,67,0.45); transform: translateY(-1px); }

    /* ── MOBILE BOTTOM SHEET & NAV (hidden by default) ── */
    .mobile-sheet { display: none; }
    .bottom-nav { display: none; }

    /* ── DRAWER ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(32,33,36,0.5);
      z-index: 2000;
      display: none;
      align-items: flex-end;
    }
    .overlay.open { display: flex; }
    .drawer {
      background: var(--card);
      border-radius: 12px 12px 0 0;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      padding: 8px 20px 32px;
    }
    .drawer-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 20px;
    }
    .drawer h2 {
      font-family: 'Google Sans', sans-serif;
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* ── PARSE ── */
    .parse-area textarea { min-height: 100px; resize: vertical; font-size: 14px; line-height: 1.6; }
    .parse-results { margin-top: 16px; }
    .parse-result-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 8px;
    }
    .parse-result-item .item-name {
      font-family: 'Google Sans', sans-serif;
      font-weight: 500;
      font-size: 15px;
      margin-bottom: 10px;
      color: var(--text);
    }

    /* ── EDIT MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(32,33,36,0.5);
      z-index: 3000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 8px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(60,64,67,.25);
    }
    .modal h2 {
      font-family: 'Google Sans', sans-serif;
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 20px;
    }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: white;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 13px;
      z-index: 5000;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: var(--shadow-md);
    }
    .toast.show { opacity: 1; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════════════════════════════
       MOBILE LAYOUT
    ════════════════════════════════ */
    @media (hover: none) and (pointer: coarse) {
      /* Hide desktop-only elements */
      #left-panel { display: none !important; }

      /* Full-screen map */
      #app { position: fixed; inset: 0; overflow: hidden; }
      .main-content {
        position: fixed;
        top: 0; left: 0; right: 0;
        bottom: 58px; /* above bottom nav */
        z-index: 1;
      }
      #map-view { display: block !important; position: absolute; inset: 0; }

      /* Recenter above bottom nav */
      .recenter-btn { bottom: 70px; right: 10px; }

      /* ── BOTTOM SHEET ── */
      .mobile-sheet {
        display: flex;
        flex-direction: column;
        position: fixed;
        left: 0; right: 0;
        bottom: 58px;
        height: calc(100vh - 58px);
        background: white;
        border-radius: 16px 16px 0 0;
        z-index: 300;
        transform: translateY(100%);
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 -4px 24px rgba(0,0,0,0.14);
        overflow: hidden;
      }
      .mobile-sheet.open { transform: translateY(0); }

      .mobile-sheet-handle {
        width: 36px; height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin: 12px auto 6px;
        flex-shrink: 0;
        cursor: pointer;
      }

      .mobile-filter-bar {
        padding: 6px 12px 6px;
        background: white;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .mobile-filter-bar input[type=text] {
        padding: 9px 16px;
        font-size: 16px;
        border-radius: 24px;
        background: var(--bg);
        border: 1px solid var(--border);
      }

      .mobile-list-body {
        flex: 1;
        overflow-y: auto;
        padding: 8px 16px 20px;
        -webkit-overflow-scrolling: touch;
      }

      /* Show delete btn when card is expanded on touch */
      .rec-card.expanded .rec-delete-btn { opacity: 1; }

      /* ── BOTTOM NAV ── */
      .bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 58px;
        background: white;
        border-top: 1px solid var(--border);
        z-index: 500;
      }
      .nav-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        border: none;
        background: none;
        color: var(--text3);
        font-family: 'Google Sans', sans-serif;
        cursor: pointer;
        padding: 8px 4px 6px;
        transition: color 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .nav-btn.active { color: var(--blue); }
      .nav-btn svg { display: block; }
      .nav-label { font-size: 11px; font-weight: 500; }

      /* Toast above bottom nav */
      .toast { bottom: 72px; }

      /* Drawer: full mobile sheet style */
      .drawer { border-radius: 12px 12px 0 0; }
    }

    /* ════════════════════════════════
       DESKTOP LAYOUT
    ════════════════════════════════ */
    @media (hover: hover) and (pointer: fine) {
      body { overflow: hidden; }
      #app { flex-direction: row; height: 100vh; }

      #left-panel {
        display: flex;
        flex-direction: column;
        width: 380px;
        min-width: 320px;
        flex-shrink: 0;
        height: 100vh;
        border-right: 1px solid var(--border);
        background: var(--card);
        position: relative;
        z-index: 10;
      }

      header { box-shadow: none; padding: 0 16px; height: 52px; }

      .filter-bar { flex-direction: column; gap: 6px; padding: 10px 12px; }
      .filter-bar input[type=text] { min-width: unset; border-radius: 20px; }
      .filter-row { display: flex; gap: 6px; }
      .filter-row select { flex: 1; font-size: 12px; }

      #list-view {
        display: block !important;
        flex: 1;
        overflow-y: auto;
        padding: 8px 12px 80px;
      }

      .main-content { flex: 1; position: relative; }
      #map-view { display: block !important; position: absolute; inset: 0; }

      .mobile-sheet { display: none !important; }
      .bottom-nav { display: none !important; }

      .overlay { align-items: center; justify-content: center; }
      .drawer { border-radius: 8px; max-width: 500px; }

      .rec-card { padding: 8px 12px; margin-bottom: 4px; }
      .tag { font-size: 11px; padding: 2px 8px; }
      .header-count { display: inline-block; }
    }

    @media (min-width: 600px) and (hover: none) {
      .overlay { align-items: center; justify-content: center; }
      .drawer { border-radius: 8px; max-width: 560px; }
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo"><img src="icon.svg" alt="Honeymoon"></div>
    <h1>Honeymoon</h1>
    <p class="subtitle">Your Italy trip, all in one place.</p>
    <div id="auth-form">
      <div class="field" id="name-field" style="display:none">
        <label>Your Name</label>
        <input type="text" id="auth-name" placeholder="Rob" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="auth-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="auth-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary btn-full" onclick="submitAuth()">Sign In</button>
    </div>
    <div class="auth-toggle">
      <span id="auth-toggle-text">Don't have an account?</span>
      <a onclick="toggleAuthMode()"> <span id="auth-toggle-link">Sign up</span></a>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- LEFT PANEL (desktop only) -->
  <div id="left-panel">
    <header>
      <img src="icon.svg" class="header-logo" alt="">
      <h1>Honeymoon</h1>
      <span class="header-count" id="rec-count"></span>
    </header>
    <div class="filter-bar" id="filter-bar">
      <input type="text" id="search-input" placeholder="Search" oninput="applyFilters()"
        onfocus="document.getElementById('filter-bar').classList.add('filters-open')"
        onblur="setTimeout(()=>document.getElementById('filter-bar').classList.remove('filters-open'),200)" />
      <div class="filter-row">
        <select id="filter-city"   onchange="applyFilters()"><option value="">All cities</option></select>
        <select id="filter-type"   onchange="applyFilters()"><option value="">All types</option></select>
        <select id="filter-person" onchange="applyFilters()"><option value="">Everyone</option></select>
      </div>
    </div>
    <div id="list-view"></div>
    <button class="add-btn" onclick="openAddDrawer()">+</button>
  </div>

  <!-- MAP (right on desktop, full-screen on mobile) -->
  <div class="main-content">
    <div id="map-view">
      <div id="map"></div>
      <!-- Recenter / fit-all button -->
      <button class="recenter-btn" onclick="recenterMap()" title="Fit all markers">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"></polyline>
          <polyline points="9 21 3 21 3 15"></polyline>
          <line x1="21" y1="3" x2="14" y2="10"></line>
          <line x1="3" y1="21" x2="10" y2="14"></line>
        </svg>
      </button>
    </div>
  </div>

  <!-- MOBILE BOTTOM SHEET (list) -->
  <div class="mobile-sheet" id="mobile-sheet">
    <div class="mobile-sheet-handle" onclick="setMode('map')"></div>
    <div class="mobile-filter-bar" id="mobile-filter-bar">
      <input type="text" id="mobile-search" placeholder="Search…" oninput="applyFilters()"
        onfocus="document.getElementById('mobile-filter-bar').classList.add('filters-open')"
        onblur="setTimeout(()=>document.getElementById('mobile-filter-bar').classList.remove('filters-open'),200)" />
      <div class="filter-row">
        <select id="mobile-city"   onchange="applyFilters()"><option value="">All cities</option></select>
        <select id="mobile-type"   onchange="applyFilters()"><option value="">All types</option></select>
        <select id="mobile-person" onchange="applyFilters()"><option value="">Everyone</option></select>
      </div>
    </div>
    <div id="mobile-list-view" class="mobile-list-body"></div>
  </div>

  <!-- MOBILE BOTTOM NAV -->
  <div class="bottom-nav" id="bottom-nav">
    <button class="nav-btn active" id="nav-map" onclick="setMode('map')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/>
      </svg>
      <span class="nav-label">Map</span>
    </button>
    <button class="nav-btn" id="nav-list" onclick="setMode('list')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
      </svg>
      <span class="nav-label">List</span>
    </button>
    <button class="nav-btn" id="nav-add" onclick="setMode('add')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
      </svg>
      <span class="nav-label">Add</span>
    </button>
  </div>

</div><!-- end #app -->

<!-- ADD DRAWER -->
<div class="overlay" id="add-overlay" onclick="closeAddDrawer(event)">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <h2>Add recommendations</h2>
    <div class="parse-area">
      <div class="field-row">
        <div class="field">
          <label>City</label>
          <input type="text" id="input-city" placeholder="Florence" list="city-suggestions" autocomplete="off" />
          <datalist id="city-suggestions"></datalist>
        </div>
        <div class="field">
          <label>Recommended by</label>
          <input type="text" id="input-person" placeholder="Jake" list="person-suggestions" autocomplete="off" />
          <datalist id="person-suggestions"></datalist>
        </div>
      </div>
      <div class="field">
        <label>Paste anything — texts, links, lists, Instagram posts…</label>
        <textarea id="raw-input" placeholder="Da Camilo&#10;Tre Panche&#10;La Giostra"></textarea>
      </div>
      <button class="btn btn-primary btn-full" onclick="parseInput()" id="parse-btn">Add</button>
    </div>
    <div id="parse-results" class="parse-results"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-overlay" onclick="closeEditModal(event)">
  <div class="modal">
    <h2>Edit place</h2>
    <input type="hidden" id="edit-id" />
    <div class="field">
      <label>Name</label>
      <input type="text" id="edit-name" />
    </div>
    <div class="field-row">
      <div class="field">
        <label>Type</label>
        <select id="edit-type">
          <option value="restaurant">Restaurant</option>
          <option value="bar">Bar</option>
          <option value="cafe">Cafe</option>
          <option value="museum">Museum</option>
          <option value="attraction">Attraction</option>
          <option value="hotel">Hotel</option>
          <option value="shop">Shop</option>
          <option value="market">Market</option>
          <option value="beach">Beach</option>
          <option value="church">Church</option>
          <option value="neighborhood">Neighborhood</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="field">
        <label>City</label>
        <input type="text" id="edit-city" />
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Neighborhood</label>
        <input type="text" id="edit-neighborhood" />
      </div>
      <div class="field">
        <label>Recommended by</label>
        <input type="text" id="edit-recommended-by" />
      </div>
    </div>
    <div class="field">
      <label>Address</label>
      <input type="text" id="edit-address" />
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="edit-notes" style="min-height:80px;resize:vertical"></textarea>
    </div>
    <div class="field">
      <label>Source URL</label>
      <input type="text" id="edit-source-url" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TYPE_ICONS = {
  restaurant: '🍽️', bar: '🍷', cafe: '☕', museum: '🏛️',
  attraction: '🎯', hotel: '🏨', shop: '🛍️', market: '🥬',
  beach: '🏖️', church: '⛪', neighborhood: '🗺️', other: '📍'
};
const TYPE_COLORS = {
  restaurant: '#EA4335', bar: '#9334E6', cafe: '#FBBC05', museum: '#1A73E8',
  attraction: '#34A853', hotel: '#1A73E8', shop: '#EA4335', market: '#34A853',
  beach: '#1A73E8', church: '#9334E6', neighborhood: '#34A853', other: '#5f6368'
};

let sessionToken = localStorage.getItem('hm_token') || null;
let allRecs = [];
let filtered = [];
let map = null;
let markers = [];
let locationDot = null;
let authMode = 'login';
let pendingParseCount = 0;
let pendingRawInput = '';

const isDesktop = () => window.matchMedia('(hover: hover) and (pointer: fine)').matches;

// ── AUTH ──
function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  document.getElementById('name-field').style.display = authMode === 'register' ? 'block' : 'none';
  document.querySelector('#auth-form button').textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-toggle-text').textContent = authMode === 'login' ? "Don't have an account?" : 'Already have an account?';
  document.getElementById('auth-toggle-link').textContent = authMode === 'login' ? 'Sign up' : 'Sign in';
}

async function submitAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const name = document.getElementById('auth-name').value.trim();
  if (!email || !password) return showToast('Email and password required');
  const endpoint = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
  const body = authMode === 'login' ? { email, password } : { email, password, name };
  const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) return showToast(data.error || 'Error');
  sessionToken = data.token;
  localStorage.setItem('hm_token', sessionToken);
  showApp();
}

async function logout() {
  await api('/api/auth/logout', 'POST');
  localStorage.removeItem('hm_token');
  sessionToken = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

async function api(url, method = 'GET', body = null) {
  const opts = { method, headers: { 'x-session-token': sessionToken } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(url, opts);
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

async function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  await loadRecs();
  await loadFilters();
}

async function checkSession() {
  if (!sessionToken) return;
  showApp();
  const me = await api('/api/auth/me');
  if (!me) {
    localStorage.removeItem('hm_token');
    sessionToken = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
  }
}

// ── FILTER HELPERS ──
function getFilterValues() {
  if (isDesktop()) {
    return {
      search: document.getElementById('search-input').value.trim().toLowerCase(),
      city:   document.getElementById('filter-city').value.toLowerCase(),
      type:   document.getElementById('filter-type').value,
      person: document.getElementById('filter-person').value.toLowerCase(),
    };
  } else {
    return {
      search: document.getElementById('mobile-search').value.trim().toLowerCase(),
      city:   document.getElementById('mobile-city').value.toLowerCase(),
      type:   document.getElementById('mobile-type').value,
      person: document.getElementById('mobile-person').value.toLowerCase(),
    };
  }
}

async function loadRecs(fromServer = true) {
  if (fromServer) allRecs = await api('/api/recommendations') || [];
  const { search, city, type, person } = getFilterValues();
  filtered = allRecs.filter(r => {
    if (city   && (r.city||'').toLowerCase() !== city) return false;
    if (type   && r.type !== type) return false;
    if (person && !(r.recommended_by||'').toLowerCase().split(',').map(p=>p.trim()).includes(person)) return false;
    if (search) {
      const hay = [r.name, r.city, r.notes, r.recommended_by].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  renderList();
  if (map) renderMapMarkers();
  document.getElementById('rec-count').textContent = filtered.length + (filtered.length === 1 ? ' place' : ' places');
}

async function loadFilters() {
  const data = await api('/api/filters');
  if (!data) return;
  // Desktop selects
  fillSelect('filter-city', data.cities);
  fillSelect('filter-type', data.types);
  fillSelect('filter-person', data.people);
  // Mobile selects
  fillSelect('mobile-city', data.cities);
  fillSelect('mobile-type', data.types);
  fillSelect('mobile-person', data.people);
  // Datalists
  fillDatalist('city-suggestions', data.cities);
  fillDatalist('person-suggestions', data.people);
}

function fillDatalist(id, items) {
  const dl = document.getElementById(id);
  if (!dl) return;
  dl.innerHTML = items.map(v => `<option value="${esc(v)}">`).join('');
}

function fillSelect(id, items) {
  const sel = document.getElementById(id);
  if (!sel) return;
  const current = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  items.forEach(v => {
    const o = document.createElement('option');
    o.value = v;
    o.textContent = v.charAt(0).toUpperCase() + v.slice(1);
    sel.appendChild(o);
  });
  if (current) sel.value = current;
}

let filterDebounce = null;
function applyFilters() {
  clearTimeout(filterDebounce);
  filterDebounce = setTimeout(() => loadRecs(false), 150);
}

// ── RENDER ──
function cardHtml(r) {
  return `
    <div class="rec-card" id="card-${r.id}" onclick="toggleCard(${r.id})">
      <button class="rec-delete-btn" onclick="deleteRec(${r.id},event)" title="Delete">×</button>
      <div class="rec-card-top">
        <div class="rec-type-icon">${TYPE_ICONS[r.type] || '📍'}</div>
        <div class="rec-card-info">
          <div class="rec-name-line">
            <div class="rec-name">${esc(r.name.replace(/^[\p{Emoji}\s]+/u, '').trim() || r.name)}</div>
            ${r.city ? `<div class="rec-city-text">${esc(r.city)}</div>` : ''}
          </div>
          ${r.recommended_by ? `<div class="rec-tags">${r.recommended_by.split(',').map(p=>`<span class="tag person">${esc(p.trim())}</span>`).join('')}</div>` : ''}
        </div>
      </div>
      ${r.notes ? `<div class="rec-notes">${esc(r.notes)}${r.source_url ? `<br><a href="${esc(r.source_url)}" target="_blank" style="color:var(--blue);font-size:12px;margin-top:6px;display:inline-block">View source ↗</a>` : ''}</div>` : ''}
      <div class="rec-actions">
        <button class="btn btn-ghost btn-sm" onclick="openEdit(${r.id},event)">Edit</button>
      </div>
    </div>`;
}

function emptyHtml() {
  return `<div class="empty-state"><div class="emoji">🗺️</div><p>No recommendations yet.<br>Tap <strong>+</strong> to get started.</p></div>`;
}

function renderList() {
  const html = !allRecs.length ? emptyHtml() : (filtered.length ? filtered.map(cardHtml).join('') : '<div class="empty-state"><p>No matches.</p></div>');
  const desktop = document.getElementById('list-view');
  if (desktop) desktop.innerHTML = html;
  const mobile = document.getElementById('mobile-list-view');
  if (mobile) mobile.innerHTML = html;
}

function toggleCard(id) {
  document.getElementById('card-' + id)?.classList.toggle('expanded');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── MOBILE NAV ──
function setMode(mode) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (mode !== 'add') {
    const btn = document.getElementById('nav-' + mode);
    if (btn) btn.classList.add('active');
  }

  const sheet = document.getElementById('mobile-sheet');
  if (mode === 'list') {
    sheet.classList.add('open');
    if (!map) initMap();
  } else if (mode === 'map') {
    sheet.classList.remove('open');
    if (!map) initMap();
    document.getElementById('nav-map').classList.add('active');
  } else if (mode === 'add') {
    sheet.classList.remove('open');
    document.getElementById('nav-map').classList.add('active');
    openAddDrawer();
  }
}

// ── MAP ──
function initMap() {
  if (map) { renderMapMarkers(); return; }
  map = L.map('map', { zoomControl: false }).setView([42.5, 12.5], 6);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>',
    maxZoom: 19,
    subdomains: 'abcd'
  }).addTo(map);

  // Current location blue dot
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      const ll = [pos.coords.latitude, pos.coords.longitude];
      if (locationDot) map.removeLayer(locationDot);
      locationDot = L.circleMarker(ll, {
        radius: 9,
        fillColor: '#4285F4',
        color: 'white',
        weight: 3,
        fillOpacity: 1,
        zIndexOffset: 1000
      }).addTo(map).bindPopup('You are here');
    }, () => {}, { enableHighAccuracy: true, timeout: 8000 });
  }

  renderMapMarkers();
}

function recenterMap() {
  if (!map) return;
  if (markers.length) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.3), { maxZoom: 14 });
  } else {
    map.setView([42.5, 12.5], 6);
  }
}

function renderMapMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  filtered.filter(r => r.latitude && r.longitude).forEach(r => {
    const color = TYPE_COLORS[r.type] || '#1A73E8';
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${color};display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.3);border:2px solid white"><span style="transform:rotate(45deg);font-size:16px;line-height:1">${TYPE_ICONS[r.type]||'📍'}</span></div>`,
      iconSize: [36, 36], iconAnchor: [18, 36], popupAnchor: [0, -36]
    });
    const m = L.marker([r.latitude, r.longitude], { icon })
      .addTo(map)
      .bindPopup(`<strong>${r.name}</strong>${r.city?`<br><span style="color:#5f6368;font-size:12px">${r.city}</span>`:''}${r.recommended_by?`<br><em style="color:#5f6368;font-size:12px">${r.recommended_by}</em>`:''}${r.notes?`<br><small style="color:#5f6368">${r.notes.substring(0,100)}</small>`:''}`, { maxWidth: 220 });
    markers.push(m);
  });
  if (markers.length) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.3), { maxZoom: 14 });
  }
}

// ── ADD DRAWER ──
function openAddDrawer() {
  document.getElementById('raw-input').value = '';
  document.getElementById('input-city').value = '';
  document.getElementById('input-person').value = '';
  document.getElementById('parse-results').innerHTML = '';
  document.getElementById('add-overlay').classList.add('open');
}

function closeAddDrawer(e) {
  if (!e || e.target === document.getElementById('add-overlay')) {
    document.getElementById('add-overlay').classList.remove('open');
  }
}

async function parseInput() {
  const input = document.getElementById('raw-input').value.trim();
  if (!input) return showToast('Paste something first');
  const btn = document.getElementById('parse-btn');
  btn.innerHTML = '<span class="spinner"></span> Parsing…';
  btn.disabled = true;
  const data = await api('/api/parse', 'POST', { input });
  btn.innerHTML = 'Parse with AI';
  btn.disabled = false;
  if (!data || !data.recommendations) return showToast('Could not parse — try again');
  renderParseResults(data.recommendations, input);
}

function renderParseResults(recs, rawInput) {
  const el = document.getElementById('parse-results');
  if (!recs.length) { el.innerHTML = '<p style="color:var(--text2);font-size:13px">No recommendations found.</p>'; return; }
  const types = ['restaurant','bar','cafe','museum','attraction','hotel','shop','market','beach','church','neighborhood','other'];
  const isSingle = recs.length === 1;
  pendingParseCount = recs.length;
  pendingRawInput = rawInput;
  el.innerHTML = recs.map((r, i) => `
    <div class="parse-result-item" id="result-${i}">
      <div class="item-name" data-name="${esc(r.name)}">${esc(r.name)}</div>
      <div class="field">
        <label>Type</label>
        <select id="r-type-${i}">${types.map(t=>`<option value="${t}"${r.type===t?' selected':''}>${t.charAt(0).toUpperCase()+t.slice(1)}</option>`).join('')}</select>
      </div>
      ${isSingle ? `<div class="field"><label>Notes</label><textarea id="r-notes-${i}" style="min-height:60px;resize:vertical">${esc(r.notes||'')}</textarea></div>` : ''}
    </div>
  `).join('') + `
    <div style="display:flex;gap:8px;margin-top:8px;padding-bottom:8px">
      <button class="btn btn-ghost" onclick="closeAddDrawer()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveParseResults()">Save ${recs.length} place${recs.length>1?'s':''}</button>
    </div>`;
}

async function saveParseResults() {
  const count = pendingParseCount;
  const rawInput = pendingRawInput;
  const city = document.getElementById('input-city').value.trim();
  const recommended_by = document.getElementById('input-person').value.trim();
  const isSingle = count === 1;
  const recs = [];
  for (let i = 0; i < count; i++) {
    const nameDiv = document.querySelector(`#result-${i} .item-name`);
    recs.push({
      name: nameDiv ? nameDiv.dataset.name : '',
      type: document.getElementById(`r-type-${i}`)?.value,
      city, recommended_by,
      notes: isSingle ? (document.getElementById(`r-notes-${i}`)?.value || '') : '',
      raw_input: rawInput,
    });
  }
  const btn = document.querySelector('#parse-results .btn-primary');
  if (btn) { btn.innerHTML = '<span class="spinner"></span> Saving…'; btn.disabled = true; }
  const saved = await api('/api/recommendations', 'POST', recs);
  closeAddDrawer();
  showToast(`Saved ${saved?.length || count} place${count>1?'s':''}!`);
  await loadRecs();
  await loadFilters();
}

// ── EDIT ──
function openEdit(id, e) {
  if (e) e.stopPropagation();
  const r = allRecs.find(x => x.id === id);
  if (!r) return;
  document.getElementById('edit-id').value = r.id;
  document.getElementById('edit-name').value = r.name || '';
  document.getElementById('edit-type').value = r.type || 'other';
  document.getElementById('edit-city').value = r.city || '';
  document.getElementById('edit-neighborhood').value = r.neighborhood || '';
  document.getElementById('edit-recommended-by').value = r.recommended_by || '';
  document.getElementById('edit-address').value = r.address || '';
  document.getElementById('edit-notes').value = r.notes || '';
  document.getElementById('edit-source-url').value = r.source_url || '';
  document.getElementById('edit-overlay').classList.add('open');
}

function closeEditModal(e) {
  if (!e || e.target === document.getElementById('edit-overlay')) {
    document.getElementById('edit-overlay').classList.remove('open');
  }
}

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const body = {
    name: document.getElementById('edit-name').value,
    type: document.getElementById('edit-type').value,
    city: document.getElementById('edit-city').value,
    neighborhood: document.getElementById('edit-neighborhood').value,
    recommended_by: document.getElementById('edit-recommended-by').value,
    address: document.getElementById('edit-address').value,
    notes: document.getElementById('edit-notes').value,
    source_url: document.getElementById('edit-source-url').value,
  };
  await api('/api/recommendations/' + id, 'PUT', body);
  closeEditModal();
  showToast('Saved!');
  await loadRecs();
  await loadFilters();
}

async function deleteRec(id, e) {
  if (e) e.stopPropagation();
  if (!confirm('Delete this recommendation?')) return;
  await api('/api/recommendations/' + id, 'DELETE');
  showToast('Deleted');
  await loadRecs();
  await loadFilters();
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ── INIT ──
if (isDesktop()) {
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('map-view').style.display = 'block';
  setTimeout(initMap, 100);
} else {
  // Mobile: map always visible, start in map mode
  setTimeout(initMap, 100);
  document.getElementById('nav-map').classList.add('active');
}
checkSession();
</script>
</body>
</html>
